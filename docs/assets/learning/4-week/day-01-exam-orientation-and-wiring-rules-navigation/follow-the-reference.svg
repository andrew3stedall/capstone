<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Follow the cross-reference</title>
  <desc id="desc">A black-and-white stick figure follows arrows from a clause page to a definition page and then to a final decision card.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="80" y="120" width="210" height="230"/>
    <path d="M115 165h140M115 210h140M115 255h105"/>
    <rect x="375" y="120" width="210" height="230"/>
    <path d="M410 165h140M410 210h140M410 255h100"/>
    <rect x="670" y="120" width="210" height="230"/>
    <path d="M705 165h140M705 210h140M705 255h95"/>
    <path d="M290 235h85M350 205l30 30-30 30"/>
    <path d="M585 235h85M645 205l30 30-30 30"/>
    <circle cx="480" cy="405" r="28"/>
    <path d="M480 433v62M480 458l-55 20M480 458l55 20M480 495l-35 35M480 495l35 35"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="185" y="390" font-size="28" font-weight="700">Relevant clause</text>
    <text x="480" y="390" font-size="28" font-weight="700">Definition</text>
    <text x="775" y="390" font-size="28" font-weight="700">Supported decision</text>
    <text x="480" y="80" font-size="34" font-weight="700">The first useful page may not be the last page.</text>
    <text x="480" y="525" font-size="23">Cross-references are directions, not optional scenery.</text>
  </g>
</svg>