<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Climb the evidence ladder</title>
  <desc id="desc">A black-and-white instructional cartoon showing a learner climbing steps from a vague search phrase through technical terms and source checks to a verified evidence trail.</desc>
  <rect width="960" height="540" fill="#fff"/>
  <g stroke="#111" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 440h135v-75h135v-75h135v-75h135v-75h135"/>
    <circle cx="165" cy="325" r="28"/>
    <path d="M165 353v70m0-48-42 35m42-35 45 20m-45 28-34 55m34-55 40 48"/>
    <path d="M720 104l38-40 38 40"/>
    <path d="M758 65v72"/>
    <rect x="790" y="145" width="110" height="150" rx="8"/>
    <path d="M815 180h60m-60 35h60m-60 35h42"/>
  </g>
  <g fill="#111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="182" y="475" font-size="24">vague phrase</text>
    <text x="318" y="400" font-size="24">object + action</text>
    <text x="452" y="325" font-size="24">technical term</text>
    <text x="587" y="250" font-size="24">source + scope</text>
    <text x="722" y="175" font-size="24">verified trail</text>
    <text x="480" y="520" font-size="30" font-weight="700">Confidence is not a shortcut between steps.</text>
  </g>
</svg>