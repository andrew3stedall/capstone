<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Neutrals need boundaries</title>
  <desc id="desc">Two stick figures stand beside separate RCD-protected circuits whose neutral conductors cross, causing confusion and unwanted tripping.</desc>
  <rect width="900" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="210" y="90" width="150" height="95"/>
    <rect x="540" y="90" width="150" height="95"/>
    <path d="M245 115h80M245 150h80M575 115h80M575 150h80"/>
    <path d="M285 185v75M615 185v75"/>
    <path d="M285 260c0 55 330 55 330 0"/>
    <path d="M615 260c0 55-330 55-330 0" stroke-dasharray="11 9"/>
    <circle cx="110" cy="190" r="26"/>
    <path d="M110 216v78M110 242l-45 38M110 242l45 38M110 294l-35 65M110 294l35 65"/>
    <circle cx="790" cy="190" r="26"/>
    <path d="M790 216v78M790 242l-45 38M790 242l45 38M790 294l-35 65M790 294l35 65"/>
    <path d="M155 220l55-40M745 220l-55-40"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="450" y="45" font-size="30" font-weight="700">Shared neutrals: two circuits, one argument</text>
    <text x="285" y="82" font-size="23">RCD A</text>
    <text x="615" y="82" font-size="23">RCD B</text>
    <text x="450" y="345" font-size="23">Keep each protected circuit's return path with its own device.</text>
    <text x="450" y="385" font-size="21">“Crossed neutrals are excellent at starting trips and bad explanations.”</text>
  </g>
</svg>