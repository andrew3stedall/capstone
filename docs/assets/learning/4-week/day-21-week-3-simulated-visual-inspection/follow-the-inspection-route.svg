<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Follow the inspection route</title>
  <desc id="desc">A black-and-white stick figure follows a numbered route through supply, switchboard, wiring, equipment and special-location stations instead of chasing one large warning symbol.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="115" cy="150" r="30"/>
    <path d="M115 180v90M115 210l-55 35M115 210l55 35M115 270l-42 70M115 270l42 70"/>
    <path d="M180 290C260 220 305 360 390 285S535 205 615 290 760 365 845 270" stroke-dasharray="12 12"/>
    <rect x="205" y="95" width="110" height="90" rx="8"/>
    <rect x="365" y="335" width="110" height="90" rx="8"/>
    <rect x="525" y="90" width="110" height="90" rx="8"/>
    <rect x="685" y="335" width="110" height="90" rx="8"/>
    <circle cx="855" cy="130" r="58"/>
    <path d="M855 95v46M855 168v2"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="260" y="145" font-size="26" font-weight="700">1 Supply</text>
    <text x="420" y="388" font-size="26" font-weight="700">2 Board</text>
    <text x="580" y="140" font-size="26" font-weight="700">3 Wiring</text>
    <text x="740" y="388" font-size="26" font-weight="700">4 Equipment</text>
    <text x="855" y="225" font-size="24" font-weight="700">Obvious concern</text>
    <text x="480" y="485" font-size="32" font-weight="700">Follow the route. Record the whole story.</text>
    <text x="480" y="520" font-size="23">Priority does not cancel systematic coverage.</text>
  </g>
</svg>
