<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Check the load, cable and protective device together</title>
  <desc id="desc">A black-and-white stick figure studies three connected boxes labelled load, cable and protective device. The caption says Protection is a relationship, not a lucky number.</desc>
  <rect width="900" height="500" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="150" r="34"/>
    <line x1="120" y1="184" x2="120" y2="300"/>
    <line x1="120" y1="220" x2="70" y2="265"/>
    <line x1="120" y1="220" x2="175" y2="245"/>
    <line x1="120" y1="300" x2="80" y2="370"/>
    <line x1="120" y1="300" x2="165" y2="370"/>
    <rect x="260" y="90" width="170" height="100" rx="10"/>
    <rect x="520" y="90" width="170" height="100" rx="10"/>
    <rect x="390" y="260" width="210" height="100" rx="10"/>
    <line x1="430" y1="140" x2="520" y2="140"/>
    <line x1="345" y1="190" x2="430" y2="260"/>
    <line x1="605" y1="190" x2="555" y2="260"/>
    <line x1="175" y1="245" x2="260" y2="160"/>
  </g>
  <g fill="black" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="345" y="145" font-size="30" font-weight="700">LOAD</text>
    <text x="605" y="145" font-size="30" font-weight="700">CABLE</text>
    <text x="495" y="305" font-size="25" font-weight="700">PROTECTIVE</text>
    <text x="495" y="338" font-size="25" font-weight="700">DEVICE</text>
    <text x="450" y="435" font-size="30" font-weight="700">“Protection is a relationship, not a lucky number.”</text>
  </g>
</svg>
