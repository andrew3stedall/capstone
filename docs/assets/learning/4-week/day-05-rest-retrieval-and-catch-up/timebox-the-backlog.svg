<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Time-box the backlog</title>
  <desc id="desc">A stick figure places one essential task into a small box labelled 30 minutes while a larger optional pile waits outside. The caption says The backlog can wait; the timer cannot.</desc>
  <rect width="900" height="520" fill="white"/>
  <g stroke="black" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="210" cy="145" r="42"/>
    <path d="M210 187 L210 315 M210 220 L300 245 M210 230 L150 285 M210 315 L165 405 M210 315 L255 405"/>
    <rect x="315" y="205" width="210" height="150" rx="12"/>
    <path d="M315 245 H525"/>
    <rect x="345" y="265" width="150" height="55" rx="8"/>
    <path d="M540 150 L610 150 L610 205 L540 205 Z"/>
    <rect x="670" y="130" width="120" height="60"/>
    <rect x="655" y="190" width="135" height="60"/>
    <rect x="640" y="250" width="150" height="60"/>
    <rect x="625" y="310" width="165" height="60"/>
  </g>
  <text x="420" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="black">30 MINUTES</text>
  <text x="420" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="black">ESSENTIAL</text>
  <text x="710" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="black">OPTIONAL</text>
  <text x="450" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="black">The backlog can wait; the timer cannot.</text>
</svg>