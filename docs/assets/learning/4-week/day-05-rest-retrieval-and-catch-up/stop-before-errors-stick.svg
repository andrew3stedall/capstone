<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Stop before fatigue turns study into error practice</title>
  <desc id="desc">A tired stick figure stands beside a timer and a stop sign. One small card labelled Correct one error sits inside a thirty-minute box, while a large backlog remains outside.</desc>
  <rect width="900" height="520" fill="white"/>
  <g stroke="black" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="185" cy="145" r="42"/>
    <path d="M185 187 L185 315 M185 220 L125 275 M185 220 L250 255 M185 315 L145 405 M185 315 L235 405"/>
    <path d="M165 140 L178 146 M205 140 L192 146 M171 166 Q185 156 199 166"/>
    <circle cx="360" cy="165" r="75"/>
    <path d="M360 105 L360 165 L405 190"/>
    <rect x="300" y="265" width="270" height="150" rx="12"/>
    <path d="M585 110 L670 110 L710 180 L670 250 L585 250 L545 180 Z"/>
    <rect x="620" y="250" width="18" height="170"/>
    <path d="M610 315 L690 315 M610 350 L705 350 M610 385 L680 385"/>
    <path d="M720 315 L840 315 M720 350 L835 350 M720 385 L825 385 M720 420 L850 420"/>
  </g>
  <g fill="black" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="360" y="185" font-size="28">30 min</text>
    <text x="435" y="315" font-size="27">Correct one</text>
    <text x="435" y="352" font-size="27">important error</text>
    <text x="628" y="191" font-size="30" font-weight="bold">STOP</text>
    <text x="780" y="470" font-size="24">Backlog waits</text>
    <text x="450" y="495" font-size="25" font-weight="bold">Recovery is part of accurate practice.</text>
  </g>
</svg>