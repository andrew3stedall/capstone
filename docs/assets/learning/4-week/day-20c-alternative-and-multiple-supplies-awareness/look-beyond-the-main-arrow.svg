<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">Look beyond the main supply arrow</title>
  <desc id="desc">A black-and-white instructional cartoon showing a stick figure studying a switchboard supplied by one obvious arrow while a second source arrow approaches from behind.</desc>
  <rect width="800" height="420" fill="#fff"/>
  <g fill="none" stroke="#111" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="330" y="100" width="190" height="220" rx="12"/>
    <line x1="425" y1="145" x2="425" y2="270"/>
    <circle cx="425" cy="210" r="15"/>
    <path d="M80 165 H300"/>
    <path d="M270 135 L305 165 L270 195"/>
    <path d="M720 285 H550" stroke-dasharray="15 12"/>
    <path d="M580 255 L545 285 L580 315"/>
    <circle cx="185" cy="285" r="28"/>
    <path d="M185 313 V365 M185 330 L145 350 M185 330 L225 345 M185 365 L155 400 M185 365 L220 400"/>
    <path d="M210 260 Q255 225 315 215"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#111" text-anchor="middle">
    <text x="190" y="125" font-size="27" font-weight="700">NORMAL SOURCE</text>
    <text x="635" y="245" font-size="25" font-weight="700">OTHER PATH?</text>
    <text x="425" y="355" font-size="25" font-weight="700">DISTRIBUTION BOARD</text>
    <text x="400" y="395" font-size="22">Map every credible energisation path.</text>
  </g>
</svg>
