<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">Map sources before relying on switches</title>
  <desc id="desc">A black-and-white instructional cartoon showing a stick figure holding a map with several source arrows and declining a shortcut sign marked one switch.</desc>
  <rect width="800" height="420" fill="#fff"/>
  <g fill="none" stroke="#111" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="185" cy="105" r="28"/>
    <path d="M185 133 V245 M185 165 L125 205 M185 165 L255 195 M185 245 L145 325 M185 245 L235 325"/>
    <rect x="255" y="120" width="250" height="180" rx="8"/>
    <path d="M275 155 C330 115 375 190 430 145"/>
    <path d="M280 245 C335 205 390 275 470 220"/>
    <path d="M320 145 L340 125 M320 145 L345 158"/>
    <path d="M445 220 L465 200 M445 220 L470 235"/>
    <path d="M560 95 H725 V235 H560 Z"/>
    <line x1="642" y1="235" x2="642" y2="335"/>
    <path d="M535 255 Q500 300 460 315"/>
    <path d="M475 290 L455 317 L487 320"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#111" text-anchor="middle">
    <text x="380" y="100" font-size="25" font-weight="700">SOURCE MAP</text>
    <text x="642" y="145" font-size="27" font-weight="700">ONE</text>
    <text x="642" y="180" font-size="27" font-weight="700">SWITCH</text>
    <text x="642" y="215" font-size="20">shortcut</text>
    <text x="400" y="380" font-size="22">A component is not a complete boundary argument.</text>
  </g>
</svg>
