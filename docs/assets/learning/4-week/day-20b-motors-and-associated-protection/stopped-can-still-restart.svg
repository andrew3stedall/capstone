<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
<title id="title">Stopped can still restart</title>
<desc id="desc">A black-and-white stick figure stands beside a stationary motor while a remote-start arrow and an automatic restart arrow approach the controller.</desc>
<rect width="800" height="420" fill="white"/>
<g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="130" cy="105" r="28"/>
  <path d="M130 133v92m0-55-50 30m50-30 50 30m-50 25-42 70m42-70 42 70"/>
  <rect x="300" y="125" width="120" height="110" rx="12"/>
  <circle cx="360" cy="180" r="30"/>
  <path d="M420 155h35m-35 50h35"/>
  <rect x="520" y="135" width="150" height="90" rx="10"/>
  <path d="M595 225v55"/>
  <path d="M500 85h-105l25-20m-25 20 25 20"/>
  <path d="M700 85H595v50m0-50-25-20m25 20-25 20"/>
  <path d="M205 300h420"/>
</g>
<g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
  <text x="447" y="55" font-size="24">REMOTE START</text>
  <text x="650" y="55" font-size="24">AUTO RESTART</text>
  <text x="360" y="265" font-size="22">MOTOR</text>
  <text x="595" y="178" font-size="22">CONTROLLER</text>
  <text x="400" y="360" font-size="26">Stopped is not isolated—and may not stay stopped.</text>
</g>
</svg>