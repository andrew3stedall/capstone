<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">One design needs many connected checks</title>
  <desc id="desc">A black-and-white stick figure links six labelled boxes for demand, cable, route, voltage, sources and switchboard evidence. A caption warns against trusting one calculation.</desc>
  <rect width="960" height="540" fill="white"/>
  <g stroke="black" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="250" r="28"/>
    <path d="M120 278v95M120 310l-50 45M120 310l58 35M120 373l-42 75M120 373l50 75"/>
    <rect x="280" y="70" width="180" height="72" rx="8"/>
    <rect x="500" y="70" width="180" height="72" rx="8"/>
    <rect x="720" y="70" width="180" height="72" rx="8"/>
    <rect x="280" y="255" width="180" height="72" rx="8"/>
    <rect x="500" y="255" width="180" height="72" rx="8"/>
    <rect x="720" y="255" width="180" height="72" rx="8"/>
    <path d="M178 345L280 106M178 345L280 291M178 345L500 106M178 345L500 291M178 345L720 106M178 345L720 291"/>
    <path d="M460 106h40M680 106h40M460 291h40M680 291h40"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="370" y="113" font-size="24">DEMAND</text>
    <text x="590" y="113" font-size="24">CABLE</text>
    <text x="810" y="113" font-size="24">ROUTE</text>
    <text x="370" y="298" font-size="24">VOLTAGE</text>
    <text x="590" y="298" font-size="24">SOURCES</text>
    <text x="810" y="298" font-size="24">BOARD</text>
    <text x="480" y="492" font-size="28" font-weight="bold">One tidy calculation is not the whole design.</text>
  </g>
</svg>