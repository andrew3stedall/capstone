<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">Sort the error, not just the score</title>
  <desc id="desc">A black-and-white instructional cartoon showing a learner sorting mock-exam cards into labelled trays for knowledge, process, safety, source and time instead of placing one large score over the pile.</desc>
  <rect width="800" height="420" fill="#fff"/>
  <g fill="none" stroke="#000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="130" cy="95" r="34"/>
    <path d="M130 129v95m0-65-55 42m55-42 58 30m-58 35-45 80m45-80 45 80"/>
    <path d="M205 112h112v72H205z"/>
    <path d="M227 132h68m-68 22h44"/>
    <path d="M335 255h112v90H335zm125 0h112v90H460zm125 0h112v90H585z"/>
    <path d="M355 236l46-35 46 35m33 0 46-35 46 35m33 0 46-35 46 35"/>
    <path d="M296 190c35 4 57 18 83 43" stroke-dasharray="10 12"/>
    <path d="M290 181l12 10-15 4"/>
    <path d="M80 332h190"/>
    <path d="M100 350h150"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="24" fill="#000" text-anchor="middle">
    <text x="261" y="104" font-weight="700">72%</text>
    <text x="391" y="305">Knowledge</text>
    <text x="516" y="305">Process</text>
    <text x="641" y="305">Safety</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="20" fill="#000">
    <text x="62" y="390">One score cannot explain the error mechanism.</text>
  </g>
</svg>
