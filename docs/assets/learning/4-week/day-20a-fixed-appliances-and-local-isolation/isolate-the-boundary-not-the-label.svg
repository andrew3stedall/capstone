<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
<title id="title">Isolate the boundary, not the label</title>
<desc id="desc">A black-and-white stick figure traces three arrows from normal supply, control supply and remote start into an appliance before drawing a boundary around all connections.</desc>
<rect width="900" height="420" fill="white"/>
<g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
<circle cx="120" cy="115" r="32"/><path d="M120 147v105M120 180l-55 48M120 180l60 30M120 252l-42 75M120 252l48 75"/>
<rect x="600" y="115" width="190" height="170" rx="14"/><circle cx="695" cy="200" r="45"/><path d="M675 200h40M695 180v40"/>
<path d="M280 90h250l60 55M280 200h270M280 310h250l60-55"/>
<path d="M570 137l20 8-7-21M570 200l20 0-14-14M570 263l20-8-7 21"/>
<rect x="545" y="70" width="285" height="260" rx="28" stroke-dasharray="14 12"/>
<path d="M180 210h70"/>
</g>
<g font-family="Arial, sans-serif" fill="black">
<text x="285" y="75" font-size="22">NORMAL SUPPLY</text>
<text x="285" y="185" font-size="22">CONTROL SUPPLY</text>
<text x="285" y="345" font-size="22">REMOTE START</text>
<text x="695" y="360" text-anchor="middle" font-size="22">COMPLETE BOUNDARY</text>
<text x="450" y="400" text-anchor="middle" font-size="26" font-weight="700">TRACE EVERY PATH BEFORE DRAWING THE LINE.</text>
</g></svg>