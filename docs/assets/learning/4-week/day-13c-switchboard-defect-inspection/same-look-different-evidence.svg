<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Same look, different evidence</title>
  <desc id="desc">Two closed switchboards show similar marks while a stick-figure learner holds separate evidence cards, illustrating that appearance alone does not establish the same defect or cause.</desc>
  <rect width="900" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="70" y="95" width="220" height="270" rx="8"/>
    <rect x="610" y="95" width="220" height="270" rx="8"/>
    <path d="M105 160 C145 135 180 175 165 215 C140 230 110 210 105 185"/>
    <path d="M645 160 C685 135 720 175 705 215 C680 230 650 210 645 185"/>
    <circle cx="450" cy="130" r="40"/>
    <line x1="450" y1="170" x2="450" y2="315"/>
    <line x1="450" y1="215" x2="365" y2="265"/>
    <line x1="450" y1="215" x2="535" y2="265"/>
    <line x1="450" y1="315" x2="400" y2="405"/>
    <line x1="450" y1="315" x2="500" y2="405"/>
    <rect x="315" y="245" width="110" height="85" rx="5"/>
    <rect x="475" y="245" width="110" height="85" rx="5"/>
    <line x1="335" y1="275" x2="405" y2="275"/>
    <line x1="495" y1="275" x2="565" y2="275"/>
    <line x1="335" y1="300" x2="390" y2="300"/>
    <line x1="495" y1="300" x2="550" y2="300"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="180" y="405" font-size="24">Observation A</text>
    <text x="720" y="405" font-size="24">Observation B</text>
    <text x="450" y="460" font-size="34" font-weight="700">Similar marks do not prove identical causes.</text>
    <text x="450" y="500" font-size="22">Record each sign, then retrieve the evidence.</text>
  </g>
</svg>