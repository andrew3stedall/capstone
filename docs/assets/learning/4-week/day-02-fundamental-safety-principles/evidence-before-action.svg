<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Evidence before action</title>
  <desc id="desc">A black-and-white instructional cartoon showing a learner sorting an assumption, an operational indication and verified evidence before approaching electrical equipment.</desc>
  <rect width="900" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="135" cy="120" r="28"/>
    <path d="M135 148v88M135 172l-48 42M135 172l52 30M135 236l-40 70M135 236l42 70"/>
    <rect x="250" y="70" width="170" height="92" rx="8"/>
    <rect x="250" y="190" width="170" height="92" rx="8"/>
    <rect x="500" y="130" width="190" height="105" rx="8"/>
    <path d="M420 116h62M420 236h62M482 116l-15-12M482 116l-15 12M482 236l-15-12M482 236l-15 12"/>
    <rect x="750" y="95" width="92" height="170" rx="8"/>
    <circle cx="796" cy="145" r="12"/>
    <path d="M770 210h52M796 198v24"/>
    <path d="M690 182h42M732 182l-15-12M732 182l-15 12"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="135" y="350" font-size="22">Learner pauses</text>
    <text x="335" y="105" font-size="22" font-weight="700">ASSUMPTION</text>
    <text x="335" y="137" font-size="18">“It should be off.”</text>
    <text x="335" y="225" font-size="22" font-weight="700">INDICATION</text>
    <text x="335" y="257" font-size="18">“The load stopped.”</text>
    <text x="595" y="168" font-size="22" font-weight="700">VERIFIED</text>
    <text x="595" y="198" font-size="22" font-weight="700">EVIDENCE</text>
    <text x="796" y="305" font-size="20">Equipment</text>
    <text x="450" y="390" font-size="25" font-weight="700">Sort the evidence before you sort the problem.</text>
  </g>
</svg>