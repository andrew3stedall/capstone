<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Off is not proof</title>
  <desc id="desc">A black-and-white stick figure points at an off switch but stops before touching equipment because the equipment state has not been verified.</desc>
  <rect width="960" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="180" cy="135" r="34"/>
    <line x1="180" y1="169" x2="180" y2="275"/>
    <line x1="180" y1="195" x2="115" y2="235"/>
    <line x1="180" y1="195" x2="260" y2="175"/>
    <line x1="180" y1="275" x2="135" y2="345"/>
    <line x1="180" y1="275" x2="225" y2="345"/>
    <rect x="360" y="95" width="125" height="155" rx="8"/>
    <line x1="422" y1="130" x2="422" y2="205"/>
    <circle cx="422" cy="130" r="10" fill="white"/>
    <rect x="625" y="105" width="190" height="175" rx="8"/>
    <path d="M690 155 l25 25 -25 25 25 25"/>
    <line x1="485" y1="175" x2="575" y2="175" stroke-dasharray="12 12"/>
    <line x1="575" y1="135" x2="575" y2="215"/>
    <line x1="552" y1="152" x2="598" y2="198"/>
    <line x1="598" y1="152" x2="552" y2="198"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="422" y="285" font-size="27" font-weight="700">OFF</text>
    <text x="720" y="315" font-size="24">State not verified</text>
    <text x="480" y="390" font-size="30" font-weight="700">“The switch has an opinion. Evidence gets the final say.”</text>
  </g>
</svg>
