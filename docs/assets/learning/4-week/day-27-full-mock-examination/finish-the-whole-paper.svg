<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Finish the whole mock paper</title>
  <desc id="desc">A black-and-white stick figure looks from a heavily polished first page toward several untouched mock examination pages and a visible timer.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="175" cy="150" r="35"/>
    <path d="M175 185v120M175 225l-65 50M175 225l75 25M175 305l-50 95M175 305l55 95"/>
    <rect x="320" y="105" width="180" height="270" rx="8"/>
    <path d="M350 150h120M350 190h120M350 230h95M350 270h110M350 310h80"/>
    <path d="M520 125h150v250H520M690 145h130v230H690"/>
    <circle cx="760" cy="85" r="48"/>
    <path d="M760 85V53M760 85l25 18"/>
    <path d="M250 250h55M285 225l25 25-25 25"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="410" y="420" font-size="28" font-weight="700">Page 1: immaculate</text>
    <text x="685" y="420" font-size="28" font-weight="700">Pages 2–4: waiting</text>
    <text x="480" y="480" font-size="34" font-weight="700">Plan for the whole paper.</text>
    <text x="480" y="518" font-size="24">Perfection on page one does not earn time back.</text>
  </g>
</svg>
