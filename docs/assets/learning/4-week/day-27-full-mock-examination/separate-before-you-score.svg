<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Separate evidence before scoring</title>
  <desc id="desc">A black-and-white stick figure sorts cards into three labelled trays for facts, assumptions and source checks before marking a mock examination.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="475" cy="120" r="34"/>
    <path d="M475 154v120M475 195l-85 55M475 195l85 55M475 274l-55 90M475 274l55 90"/>
    <rect x="90" y="330" width="220" height="100" rx="10"/>
    <rect x="370" y="330" width="220" height="100" rx="10"/>
    <rect x="650" y="330" width="220" height="100" rx="10"/>
    <rect x="275" y="205" width="90" height="58" rx="6"/>
    <rect x="430" y="255" width="90" height="58" rx="6"/>
    <rect x="585" y="205" width="90" height="58" rx="6"/>
    <path d="M320 265l-80 65M475 313v17M630 265l90 65"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="200" y="390" font-size="30" font-weight="700">Facts</text>
    <text x="480" y="390" font-size="30" font-weight="700">Assumptions</text>
    <text x="760" y="380" font-size="28" font-weight="700">Source</text>
    <text x="760" y="412" font-size="28" font-weight="700">checks</text>
    <text x="480" y="475" font-size="34" font-weight="700">Separate before you score.</text>
    <text x="480" y="515" font-size="24">Reasoning is easier to review when it is not hiding in one pile.</text>
  </g>
</svg>
