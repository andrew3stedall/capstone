<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Match the test to the question</title>
  <desc id="desc">A black-and-white stick figure sorts separate cards labelled continuity, insulation and polarity beneath different evidence questions, showing that each test has a distinct purpose.</desc>
  <rect width="900" height="420" fill="#fff"/>
  <g fill="none" stroke="#111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="145" cy="115" r="34"/>
    <path d="M145 149v105M145 178l-58 55M145 178l68 42M145 254l-48 94M145 254l55 94"/>
    <rect x="260" y="60" width="170" height="85" rx="10"/>
    <rect x="470" y="60" width="170" height="85" rx="10"/>
    <rect x="680" y="60" width="170" height="85" rx="10"/>
    <path d="M330 145v55M555 145v55M765 145v55"/>
    <rect x="250" y="220" width="190" height="95" rx="10"/>
    <rect x="460" y="220" width="190" height="95" rx="10"/>
    <rect x="670" y="220" width="190" height="95" rx="10"/>
    <path d="M205 220c24-18 37-23 58-25"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="#111" text-anchor="middle">
    <text x="345" y="95" font-size="24">Protective path?</text>
    <text x="555" y="95" font-size="24">Separation?</text>
    <text x="765" y="95" font-size="24">Correct roles?</text>
    <text x="345" y="275" font-size="26" font-weight="700">CONTINUITY</text>
    <text x="555" y="275" font-size="26" font-weight="700">INSULATION</text>
    <text x="765" y="275" font-size="26" font-weight="700">POLARITY</text>
    <text x="450" y="385" font-size="25">One instrument ritual cannot answer every evidence question.</text>
  </g>
</svg>