<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Check both sides of the board</title>
  <desc id="desc">A black-and-white stick figure stands beside a switchboard boundary and points to upstream and downstream evidence lists.</desc>
  <rect width="960" height="420" fill="white"/>
  <g stroke="black" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="405" y="80" width="150" height="245"/>
    <line x1="480" y1="80" x2="480" y2="325" stroke-dasharray="14 12"/>
    <line x1="120" y1="190" x2="405" y2="190"/>
    <line x1="555" y1="190" x2="840" y2="190"/>
    <circle cx="480" cy="350" r="20"/>
    <line x1="480" y1="370" x2="480" y2="405"/>
    <line x1="480" y1="378" x2="430" y2="355"/>
    <line x1="480" y1="378" x2="530" y2="355"/>
    <path d="M430 355 Q300 325 220 250"/>
    <path d="M530 355 Q660 325 740 250"/>
  </g>
  <g fill="black" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="480" y="45" font-size="32" font-weight="700">A BOARD IS A BOUNDARY, NOT AN ERASER</text>
    <text x="230" y="120" font-size="24" font-weight="700">UPSTREAM</text>
    <text x="230" y="155" font-size="19">demand • source • protection</text>
    <text x="730" y="120" font-size="24" font-weight="700">DOWNSTREAM</text>
    <text x="730" y="155" font-size="19">loads • routes • operating cases</text>
    <text x="480" y="175" font-size="23" font-weight="700">SWITCHBOARD</text>
    <text x="480" y="215" font-size="18">classification</text>
    <text x="480" y="242" font-size="18">coordination</text>
    <text x="480" y="269" font-size="18">isolation</text>
  </g>
</svg>