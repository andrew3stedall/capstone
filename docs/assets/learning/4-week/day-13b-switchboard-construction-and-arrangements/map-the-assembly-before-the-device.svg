<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Map the assembly before judging one device</title>
  <desc id="desc">A stick-figure learner studies one switchboard device while arrows point to source, access, heat, fault and compatibility evidence that must also be checked.</desc>
  <rect width="960" height="440" fill="#fff"/>
  <g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="215" r="28"/>
    <path d="M120 243V330 M120 270L205 230 M120 278L62 305 M120 330L82 390 M120 330L160 390"/>
    <circle cx="222" cy="222" r="25"/>
    <path d="M240 240L275 275"/>
    <rect x="335" y="72" width="280" height="280" rx="10"/>
    <rect x="405" y="150" width="140" height="95" rx="5"/>
    <path d="M440 175H510 M440 200H510 M440 225H510"/>
    <path d="M335 110H615 M370 72V352 M580 72V352"/>
    <path d="M615 110L730 75 M615 160L760 150 M615 215L755 230 M615 270L730 325 M475 72L475 35"/>
    <rect x="730" y="45" width="170" height="55" rx="6"/>
    <rect x="760" y="122" width="150" height="55" rx="6"/>
    <rect x="755" y="202" width="155" height="55" rx="6"/>
    <rect x="730" y="300" width="180" height="55" rx="6"/>
    <rect x="390" y="8" width="170" height="55" rx="6"/>
  </g>
  <g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="815" y="80" font-size="20" font-weight="700">SOURCE</text>
    <text x="835" y="157" font-size="20" font-weight="700">ACCESS</text>
    <text x="832" y="237" font-size="20" font-weight="700">HEAT</text>
    <text x="820" y="335" font-size="20" font-weight="700">FAULT + MATCH</text>
    <text x="475" y="44" font-size="20" font-weight="700">IDENTITY</text>
    <text x="475" y="420" font-size="27" font-weight="700">One device is a clue. The assembly is the question.</text>
  </g>
</svg>
