<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">The entry counts too</title>
  <desc id="desc">Black-and-white instructional cartoon showing a robust enclosure with a cable protected along its route but unsupported and exposed at the enclosure entry.</desc>
  <rect width="960" height="420" fill="white"/>
  <g stroke="black" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="560" y="95" width="300" height="240" rx="8"/>
    <rect x="600" y="135" width="220" height="155" rx="5"/>
    <path d="M75 220 H470" stroke-width="18"/>
    <path d="M470 220 C520 220 520 290 565 290"/>
    <circle cx="250" cy="110" r="24"/>
    <path d="M250 134 V210 M250 160 L215 190 M250 160 L305 205 M250 210 L225 260 M250 210 L280 260"/>
    <circle cx="480" cy="295" r="28"/>
    <path d="M455 295 H505 M480 270 V320"/>
    <path d="M500 285 L555 290" stroke-dasharray="8 8"/>
    <path d="M380 205 L450 270"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black">
    <text x="45" y="42" font-size="30" font-weight="700">A strong box can still have a weak entry.</text>
    <text x="70" y="255" font-size="21">protected route</text>
    <text x="430" y="355" font-size="21" font-weight="700">unsupported transition</text>
    <text x="615" y="125" font-size="21">robust enclosure</text>
    <text x="165" y="75" font-size="22" font-weight="700">“The enclosure is excellent.”</text>
    <text x="550" y="375" font-size="22" font-weight="700">“So check how the cable reaches it.”</text>
  </g>
</svg>