<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Protect the whole route</title>
  <desc id="desc">Black-and-white instructional cartoon. One learner follows a cable route through a wall, ceiling, column and machine entry while another protects only the straight middle section.</desc>
  <rect width="960" height="420" fill="white"/>
  <g stroke="black" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M70 310 H220 V125 H500 V310 H760 V205 H890"/>
    <rect x="42" y="265" width="62" height="90"/>
    <rect x="870" y="175" width="55" height="80"/>
    <path d="M220 80 V355 M500 80 V355 M760 150 V355"/>
    <circle cx="140" cy="170" r="24"/>
    <path d="M140 194 V270 M140 220 L105 245 M140 220 L185 195 M140 270 L115 320 M140 270 L170 320"/>
    <circle cx="625" cy="185" r="24"/>
    <path d="M625 209 V285 M625 235 L590 265 M625 235 L675 260 M625 285 L600 335 M625 285 L655 335"/>
    <path d="M550 292 H700" stroke-width="12"/>
    <path d="M183 195 L220 125 M183 195 L500 125 M183 195 L760 310 M183 195 L870 205" stroke-width="2" stroke-dasharray="8 10"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black">
    <text x="35" y="40" font-size="30" font-weight="700">Protect the route, not just the easy bit.</text>
    <text x="82" y="365" font-size="20">source</text>
    <text x="206" y="390" font-size="20">wall entry</text>
    <text x="405" y="105" font-size="20">ceiling</text>
    <text x="705" y="390" font-size="20">column</text>
    <text x="835" y="285" font-size="20">machine entry</text>
    <text x="545" y="350" font-size="22" font-weight="700">“The middle is protected.”</text>
    <text x="70" y="95" font-size="22" font-weight="700">“And every transition?”</text>
  </g>
</svg>