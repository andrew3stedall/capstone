<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Check the conductor role before trusting its colour</title>
  <desc id="desc">A black-and-white stick figure holds a conductor and reads a job card labelled normal role, fault role and connections. A colour swatch beside it says clue, not proof.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="210" cy="135" r="42"/>
    <path d="M210 177v135M210 220l-82 72M210 220l92 40M210 312l-65 105M210 312l74 105"/>
    <path d="M302 260c60-30 110-30 170 0s110 30 170 0"/>
    <rect x="505" y="92" width="330" height="250" rx="18"/>
    <path d="M548 155h230M548 215h230M548 275h230"/>
    <rect x="650" y="365" width="185" height="80" rx="14"/>
    <path d="M678 392h130M678 420h95"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black">
    <text x="670" y="130" text-anchor="middle" font-size="30" font-weight="700">JOB CARD</text>
    <text x="548" y="148" font-size="24">Normal role?</text>
    <text x="548" y="208" font-size="24">Fault role?</text>
    <text x="548" y="268" font-size="24">Connects what?</text>
    <text x="742" y="397" text-anchor="middle" font-size="23" font-weight="700">COLOUR</text>
    <text x="742" y="427" text-anchor="middle" font-size="21">clue, not proof</text>
    <text x="480" y="492" text-anchor="middle" font-size="31" font-weight="700">Ask for the job description before hiring the wire.</text>
  </g>
</svg>