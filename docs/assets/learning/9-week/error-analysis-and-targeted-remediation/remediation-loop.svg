<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
<title id="title">Targeted remediation loop</title><desc id="desc">A black-and-white flow from error inventory to root weakness, one correction, changed-case test and residual uncertainty.</desc>
<rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="40" y="150" width="140" height="90" rx="12"/><rect x="220" y="150" width="140" height="90" rx="12"/><rect x="400" y="150" width="140" height="90" rx="12"/><rect x="580" y="150" width="140" height="90" rx="12"/><rect x="750" y="150" width="120" height="90" rx="12"/><path d="M180 195h40M360 195h40M540 195h40M720 195h30"/><path d="M805 240v90H290v-90" stroke-dasharray="10 8"/></g><g font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black"><text x="110" y="185">Error</text><text x="110" y="210">inventory</text><text x="290" y="185">Root</text><text x="290" y="210">weakness</text><text x="470" y="185">One</text><text x="470" y="210">correction</text><text x="650" y="185">Changed-case</text><text x="650" y="210">test</text><text x="810" y="185">Residual</text><text x="810" y="210">uncertainty</text><text x="545" y="360">Repeat only when evidence shows a remaining weakness</text></g></svg>