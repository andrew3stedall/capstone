<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
<title id="title">Contradiction triage board</title><desc id="desc">Four connected black-and-white boxes separate expected observation, actual evidence, comparison and the next authorised evidence step.</desc>
<rect width="960" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="30" y="105" width="190" height="130" rx="12"/><rect x="270" y="105" width="190" height="130" rx="12"/><rect x="510" y="105" width="190" height="130" rx="12"/><rect x="750" y="105" width="180" height="130" rx="12"/><path d="M220 170h50M460 170h50M700 170h50"/><path d="M260 160l10 10-10 10M500 160l10 10-10 10M740 160l10 10-10 10"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="125" y="145" font-size="22" font-weight="700">Expectation</text><text x="125" y="180" font-size="17">written first</text><text x="365" y="145" font-size="22" font-weight="700">Observation</text><text x="365" y="180" font-size="17">scope + limits</text><text x="605" y="140" font-size="22" font-weight="700">Compare</text><text x="605" y="175" font-size="16">agree / partial</text><text x="605" y="200" font-size="16">contradict / unknown</text><text x="840" y="135" font-size="21" font-weight="700">Next evidence</text><text x="840" y="170" font-size="16">discriminate safely</text><text x="840" y="195" font-size="16">or stop + escalate</text><text x="480" y="55" font-size="28" font-weight="700">Keep expectation separate from evidence</text><text x="480" y="305" font-size="18">Agreement is not automatic proof; contradiction updates the evidence plan.</text></g></svg>