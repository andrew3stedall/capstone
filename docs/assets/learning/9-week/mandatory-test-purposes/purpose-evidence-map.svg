<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Purpose to evidence map</title><desc id="desc">Five connected boxes show verification question, test purpose, property and coverage, evidence, and bounded conclusion. A side box records limitations.</desc><rect width="900" height="420" fill="white"/><g fill="white" stroke="black" stroke-width="4"><rect x="35" y="145" width="145" height="90" rx="12"/><rect x="205" y="145" width="145" height="90" rx="12"/><rect x="375" y="145" width="160" height="90" rx="12"/><rect x="560" y="145" width="135" height="90" rx="12"/><rect x="720" y="145" width="145" height="90" rx="12"/><rect x="560" y="285" width="180" height="75" rx="12" stroke-dasharray="10 7"/><path d="M180 190h25M350 190h25M535 190h25M695 190h25M630 235v50"/></g><g font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black"><text x="108" y="180">Verification</text><text x="108" y="205">question</text><text x="278" y="180">Test</text><text x="278" y="205">purpose</text><text x="455" y="178">Property and</text><text x="455" y="203">coverage</text><text x="628" y="190">Evidence</text><text x="793" y="178">Bounded</text><text x="793" y="203">conclusion</text><text x="650" y="320">Limitations and</text><text x="650" y="344">missing evidence</text></g></svg>