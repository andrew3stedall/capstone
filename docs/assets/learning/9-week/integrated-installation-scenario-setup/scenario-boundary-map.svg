<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc"><title id="title">Scenario boundary map</title><desc id="desc">A black-and-white diagram placing the decision request at the centre, surrounded by installation purpose, operating states, evidence inventory, assumptions and authorised-reference questions.</desc><rect width="960" height="520" fill="white"/><g fill="white" stroke="black" stroke-width="3"><rect x="350" y="205" width="260" height="100" rx="14"/><rect x="55" y="70" width="240" height="90" rx="12"/><rect x="665" y="70" width="240" height="90" rx="12"/><rect x="55" y="360" width="240" height="90" rx="12"/><rect x="665" y="360" width="240" height="90" rx="12"/><path d="M295 115L350 220M665 115L610 220M295 405L350 290M665 405L610 290"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="480" y="245" font-size="24" font-weight="bold">Decision request</text><text x="480" y="278" font-size="18">bounded documentary scope</text><text x="175" y="108" font-size="20" font-weight="bold">Purpose and boundary</text><text x="175" y="137" font-size="16">functions, exclusions</text><text x="785" y="108" font-size="20" font-weight="bold">Operating states</text><text x="785" y="137" font-size="16">normal, alternate, transition</text><text x="175" y="398" font-size="20" font-weight="bold">Evidence inventory</text><text x="175" y="427" font-size="16">provenance, limitations</text><text x="785" y="392" font-size="20" font-weight="bold">Assumptions and</text><text x="785" y="418" font-size="20" font-weight="bold">reference questions</text><text x="480" y="45" font-size="28" font-weight="bold">Integrated scenario frame</text></g></svg>