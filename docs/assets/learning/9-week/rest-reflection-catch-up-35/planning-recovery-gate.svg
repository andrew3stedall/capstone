<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-labelledby="title desc"><title id="title">Planning recovery gate</title><desc id="desc">A black-and-white flow diagram showing closed-book retrieval, one correction cycle, changed-example retest, then rest or escalation.</desc><rect width="820" height="380" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="40" y="145" width="150" height="70" rx="10"/><polygon points="280,130 370,180 280,230 190,180"/><rect x="395" y="60" width="170" height="70" rx="10"/><rect x="395" y="250" width="170" height="70" rx="10"/><rect x="620" y="60" width="150" height="70" rx="10"/><rect x="620" y="250" width="150" height="70" rx="10"/><path d="M190 180h0m180 0h25M280 130V95h115M280 230v55h115M565 95h55M565 285h55"/></g><g font-family="sans-serif" font-size="17" text-anchor="middle"><text x="115" y="175">Closed-book</text><text x="115" y="198">check</text><text x="280" y="174">Blocking</text><text x="280" y="197">gap?</text><text x="480" y="90">Record strength</text><text x="480" y="113">and rest</text><text x="480" y="280">One correction</text><text x="480" y="303">cycle</text><text x="695" y="90">Stop</text><text x="695" y="113">for rest</text><text x="695" y="280">Re-test or</text><text x="695" y="303">escalate</text></g></svg>