<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc"><title id="title">Evidence ladder</title><desc id="desc">Four ascending steps labelled observation, source, interpretation and bounded decision, with a stop sign beside an evidence gap.</desc><rect width="800" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4"><path d="M80 290h150v-55h150v-55h150v-55h150"/><circle cx="95" cy="80" r="28"/><path d="M95 108v75m0-50-35 25m35-25 35 25m-35 25-30 55m30-55 30 55"/><polygon points="690,205 730,225 730,270 690,290 650,270 650,225"/></g><g font-family="Arial, sans-serif" font-size="22" fill="black"><text x="95" y="325">Observation</text><text x="250" y="270">Authorised source</text><text x="405" y="215">Interpretation</text><text x="555" y="160">Bounded decision</text><text x="665" y="255">STOP</text><text x="600" y="325">Evidence gap</text></g></svg>