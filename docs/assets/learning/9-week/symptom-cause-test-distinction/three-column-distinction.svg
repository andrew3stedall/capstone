<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Symptom cause and evidence distinction</title><desc id="desc">Three separate columns show symptom, possible causes and evidence question, leading to a bounded conclusion.</desc><rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="40" y="60" width="230" height="220" rx="10"/><rect x="335" y="60" width="230" height="220" rx="10"/><rect x="630" y="60" width="230" height="220" rx="10"/><rect x="300" y="330" width="300" height="55" rx="8"/><path d="M270 170L335 170M565 170L630 170M745 280L600 350"/></g><g font-family="sans-serif" fill="black"><text x="155" y="105" text-anchor="middle" font-size="25">Symptom</text><text x="155" y="145" text-anchor="middle" font-size="18">Observed or reported</text><text x="450" y="105" text-anchor="middle" font-size="25">Possible causes</text><text x="450" y="145" text-anchor="middle" font-size="18">Provisional explanations</text><text x="745" y="105" text-anchor="middle" font-size="25">Evidence question</text><text x="745" y="145" text-anchor="middle" font-size="18">What must be distinguished?</text><text x="450" y="365" text-anchor="middle" font-size="22">Bounded conclusion with limits</text></g></svg>