<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Diagnostic stop gates</title><desc id="desc">A diagnostic path passes through safety state, authority, competence and evidence validity gates before authorised progression.</desc><rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="35" y="165" width="155" height="90" rx="8"/><polygon points="280,120 380,210 280,300 180,210"/><polygon points="500,120 600,210 500,300 400,210"/><polygon points="720,120 820,210 720,300 620,210"/><path d="M190 210L180 210M380 210L400 210M600 210L620 210M820 210L875 210M280 300L280 360M500 300L500 360M720 300L720 360"/><rect x="180" y="360" width="540" height="40" rx="6"/></g><g font-family="sans-serif" fill="black" text-anchor="middle"><text x="112" y="200" font-size="21">Proposed next</text><text x="112" y="228" font-size="21">step</text><text x="280" y="200" font-size="19">Safety state</text><text x="280" y="225" font-size="19">known?</text><text x="500" y="195" font-size="18">Authorised and</text><text x="500" y="220" font-size="18">competent?</text><text x="720" y="195" font-size="18">Evidence and</text><text x="720" y="220" font-size="18">procedure valid?</text><text x="450" y="387" font-size="20">Any “no”: stop, preserve evidence and escalate</text><text x="855" y="195" font-size="16">Yes</text></g></svg>