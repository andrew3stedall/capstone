<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" role="img" aria-labelledby="title desc"><title id="title">Voltage-drop evidence chain</title><desc id="desc">Five evidence boxes connect from assessment boundary through length and current, conductor data, authorised criterion, and bounded conclusion.</desc><rect width="1000" height="300" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="25" y="105" width="160" height="90" rx="10"/><rect x="220" y="105" width="160" height="90" rx="10"/><rect x="415" y="105" width="160" height="90" rx="10"/><rect x="610" y="105" width="160" height="90" rx="10"/><rect x="805" y="105" width="170" height="90" rx="10"/><path d="M185 150h35 M380 150h35 M575 150h35 M770 150h35"/><path d="M210 142l10 8-10 8 M405 142l10 8-10 8 M600 142l10 8-10 8 M795 142l10 8-10 8"/></g><g font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black"><text x="105" y="140">Assessment</text><text x="105" y="166">boundary</text><text x="300" y="140">Length and</text><text x="300" y="166">current basis</text><text x="495" y="140">Conductor</text><text x="495" y="166">data</text><text x="690" y="140">Authorised</text><text x="690" y="166">criterion</text><text x="890" y="140">Bounded</text><text x="890" y="166">conclusion</text></g></svg>