<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img" aria-labelledby="title desc"><title id="title">Verification evidence layers</title><desc id="desc">A black-and-white diagram showing design intent, observed condition, test evidence and authorised criteria feeding competent comparison, which leads to a bounded conclusion or escalation.</desc><rect width="900" height="430" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="35" y="35" width="180" height="65" rx="10"/><rect x="250" y="35" width="180" height="65" rx="10"/><rect x="465" y="35" width="180" height="65" rx="10"/><rect x="680" y="35" width="180" height="65" rx="10"/><rect x="315" y="175" width="270" height="80" rx="10"/><polygon points="450,290 560,350 450,410 340,350"/><path d="M125 100v40l325 35M340 100v55l110 20M555 100v55l-105 20M770 100v40l-320 35M450 255v35"/></g><g font-family="sans-serif" font-size="18" text-anchor="middle"><text x="125" y="74">Design intent</text><text x="340" y="64">Observed</text><text x="340" y="87">condition</text><text x="555" y="74">Test evidence</text><text x="770" y="64">Authorised</text><text x="770" y="87">criterion</text><text x="450" y="209">Competent comparison</text><text x="450" y="232">and interpretation</text><text x="450" y="344">Complete and</text><text x="450" y="367">consistent?</text></g></svg>