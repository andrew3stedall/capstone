<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc"><title id="title">Installation purpose and circuit division function map</title><desc id="desc">A black-and-white diagram showing installation purpose leading to function inventory, consequence of loss, candidate groups and verification.</desc><rect x="20" y="20" width="860" height="340" fill="white" stroke="black" stroke-width="3"/><g fill="white" stroke="black" stroke-width="3"><rect x="55" y="140" width="150" height="90" rx="12"/><rect x="255" y="70" width="160" height="80" rx="12"/><rect x="255" y="220" width="160" height="80" rx="12"/><rect x="480" y="120" width="170" height="110" rx="12"/><rect x="710" y="140" width="135" height="90" rx="12"/></g><g font-family="sans-serif" font-size="18" text-anchor="middle"><text x="130" y="178">Installation</text><text x="130" y="205">purpose</text><text x="335" y="105">Functions</text><text x="335" y="132">needed</text><text x="335" y="255">Loss</text><text x="335" y="282">consequences</text><text x="565" y="160">Candidate</text><text x="565" y="188">circuit groups</text><text x="565" y="216">+ assumptions</text><text x="777" y="178">Verify and</text><text x="777" y="205">review</text></g><path d="M205 170 L250 120 M205 205 L250 250 M415 110 L475 155 M415 260 L475 205 M650 175 H705" fill="none" stroke="black" stroke-width="3" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="black"/></marker></defs></svg>