<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc"><title id="title">Electrical quantity relationship map</title><desc id="desc">Four labelled boxes for voltage, current, resistance and power connected by arrows, with a reminder to state what remains constant.</desc><rect width="800" height="360" fill="white"/><g fill="white" stroke="black" stroke-width="4"><rect x="70" y="70" width="220" height="80" rx="12"/><rect x="510" y="70" width="220" height="80" rx="12"/><rect x="70" y="230" width="220" height="80" rx="12"/><rect x="510" y="230" width="220" height="80" rx="12"/><path d="M290 110h220M180 150v80M620 150v80M290 270h220"/></g><g font-family="Arial, sans-serif" font-size="24" text-anchor="middle"><text x="180" y="120">Voltage (V)</text><text x="620" y="120">Current (A)</text><text x="180" y="280">Resistance (Ω)</text><text x="620" y="280">Power (W)</text><text x="400" y="195">State what is held constant</text></g></svg>