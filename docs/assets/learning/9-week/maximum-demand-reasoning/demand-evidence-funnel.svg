<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc"><title id="title">Maximum-demand evidence funnel</title><desc id="desc">A black-and-white funnel showing scope, load inventory, facts and assumptions, authorised method, calculation and bounded conclusion.</desc><rect x="20" y="20" width="860" height="340" fill="white" stroke="black" stroke-width="3"/><path d="M90 70 H810 L690 140 H210 Z" fill="white" stroke="black" stroke-width="3"/><path d="M210 150 H690 L610 215 H290 Z" fill="white" stroke="black" stroke-width="3"/><path d="M290 225 H610 L550 285 H350 Z" fill="white" stroke="black" stroke-width="3"/><rect x="385" y="300" width="130" height="40" fill="white" stroke="black" stroke-width="3"/><g font-family="sans-serif" text-anchor="middle"><text x="450" y="108" font-size="20">Scope + load inventory</text><text x="450" y="188" font-size="19">Facts, assumptions and units</text><text x="450" y="260" font-size="18">Authorised demand pathway</text><text x="450" y="327" font-size="17">Bounded result</text></g><path d="M820 95 V315" stroke="black" stroke-width="3" marker-end="url(#a)"/><text x="835" y="205" font-family="sans-serif" font-size="16" transform="rotate(90 835 205)">uncertainty made visible</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="black"/></marker></defs></svg>