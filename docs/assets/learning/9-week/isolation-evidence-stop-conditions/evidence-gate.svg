<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Isolation evidence gate</title><desc id="desc">Four black-and-white evidence boxes for control action, indication, documentation and verification feed a decision diamond. Missing or contradictory evidence leads to stop and escalate; complete consistent evidence leads to a bounded conclusion.</desc><rect x="10" y="10" width="940" height="400" fill="white" stroke="black" stroke-width="3"/><text x="480" y="42" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold">Isolation evidence gate</text><g fill="white" stroke="black" stroke-width="3" font-family="sans-serif" font-size="17"><rect x="45" y="85" width="170" height="70"/><rect x="255" y="85" width="170" height="70"/><rect x="465" y="85" width="170" height="70"/><rect x="675" y="85" width="220" height="70"/><text x="130" y="126" text-anchor="middle" fill="black" stroke="none">Control action</text><text x="340" y="126" text-anchor="middle" fill="black" stroke="none">Indication</text><text x="550" y="126" text-anchor="middle" fill="black" stroke="none">Documentation</text><text x="785" y="116" text-anchor="middle" fill="black" stroke="none">Authorised verification</text><text x="785" y="138" text-anchor="middle" fill="black" stroke="none">evidence</text><line x1="130" y1="155" x2="420" y2="240"/><line x1="340" y1="155" x2="450" y2="225"/><line x1="550" y1="155" x2="510" y2="225"/><line x1="785" y1="155" x2="540" y2="240"/><polygon points="480,210 610,275 480,340 350,275"/><text x="480" y="270" text-anchor="middle" fill="black" stroke="none">Complete and</text><text x="480" y="292" text-anchor="middle" fill="black" stroke="none">consistent?</text><line x1="350" y1="275" x2="160" y2="275"/><rect x="35" y="240" width="125" height="70"/><text x="97" y="268" text-anchor="middle" fill="black" stroke="none">No: stop</text><text x="97" y="290" text-anchor="middle" fill="black" stroke="none">and escalate</text><line x1="610" y1="275" x2="795" y2="275"/><rect x="795" y="240" width="130" height="70"/><text x="860" y="266" text-anchor="middle" fill="black" stroke="none">Yes: bounded</text><text x="860" y="288" text-anchor="middle" fill="black" stroke="none">conclusion</text></g><text x="480" y="385" text-anchor="middle" font-family="sans-serif" font-size="17">Several related indicators are not automatically independent evidence.</text></svg>