<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc">
  <title id="title">Catch-up gate and recovery</title>
  <desc id="desc">An error log passes through a blocking-gap decision gate. Blocking gaps receive one short review cycle; other work is scheduled later. Both paths end at rest.</desc>
  <rect width="800" height="360" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4">
    <rect x="35" y="125" width="150" height="90" rx="10"/>
    <polygon points="290,95 405,170 290,245 175,170"/>
    <rect x="430" y="55" width="180" height="90" rx="10"/>
    <rect x="430" y="215" width="180" height="90" rx="10"/>
    <rect x="650" y="125" width="115" height="90" rx="10"/>
    <path d="M185 170 H175"/><path d="M405 135 L430 100"/><path d="M405 205 L430 260"/><path d="M610 100 L650 155"/><path d="M610 260 L650 205"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle" fill="black">
    <text x="110" y="165" font-size="23">Error log</text><text x="110" y="195" font-size="17">one issue at a time</text>
    <text x="290" y="160" font-size="22">Blocking</text><text x="290" y="188" font-size="22">gap?</text>
    <text x="520" y="93" font-size="21">Short review</text><text x="520" y="121" font-size="17">then re-test</text>
    <text x="520" y="253" font-size="21">Schedule later</text><text x="520" y="281" font-size="17">do not expand today</text>
    <text x="708" y="165" font-size="23">Stop</text><text x="708" y="195" font-size="18">and rest</text>
  </g>
</svg>