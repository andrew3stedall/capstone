<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Inspection and test integration evidence board</title><desc id="desc">A black-and-white diagram links scope, inspection evidence and test-purpose evidence through contradiction and gap gates to a bounded conclusion and technical review.</desc><rect width="960" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="350" y="30" width="260" height="70" rx="10"/><rect x="70" y="155" width="230" height="85" rx="10"/><rect x="365" y="155" width="230" height="85" rx="10"/><rect x="660" y="155" width="230" height="85" rx="10"/><rect x="250" y="300" width="210" height="75" rx="10"/><rect x="520" y="300" width="210" height="75" rx="10"/><path d="M480 100v35M480 135L185 155M480 135l0 20M480 135l295 20M185 240l170 60M480 240l-125 60M480 240l145 60M775 240l-150 60M460 338h60"/><path d="M510 328l10 10-10 10"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="480" y="58" font-size="24" font-weight="700">Scope and design intent</text><text x="480" y="84" font-size="16">questions, sources, state</text><text x="185" y="190" font-size="21" font-weight="700">Inspection evidence</text><text x="185" y="218" font-size="16">observations + limits</text><text x="480" y="190" font-size="21" font-weight="700">Test-purpose evidence</text><text x="480" y="218" font-size="16">property + coverage</text><text x="775" y="190" font-size="21" font-weight="700">Expectations</text><text x="775" y="218" font-size="16">contradiction triggers</text><text x="355" y="330" font-size="20" font-weight="700">Gap and contradiction gate</text><text x="355" y="356" font-size="15">stop or obtain evidence</text><text x="625" y="330" font-size="20" font-weight="700">Bounded conclusion</text><text x="625" y="356" font-size="15">qualified review required</text></g></svg>