<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" role="img" aria-labelledby="title desc"><title id="title">Bounded recovery loop</title><desc id="desc">A black-and-white loop showing recall, one blocking gap, minimal review, correction, changed-case check and a firm stop at 25 minutes.</desc><rect width="900" height="340" fill="white"/><g fill="white" stroke="black" stroke-width="3"><rect x="40" y="130" width="120" height="70" rx="8"/><rect x="190" y="45" width="145" height="70" rx="8"/><rect x="375" y="45" width="145" height="70" rx="8"/><rect x="560" y="45" width="145" height="70" rx="8"/><rect x="690" y="170" width="165" height="70" rx="8"/><rect x="390" y="235" width="160" height="70" rx="8"/><path d="M160 145L190 100M335 80h40M520 80h40M705 105l40 65M690 220l-140 40M390 270l-230-70" fill="none"/><circle cx="105" cy="65" r="34"/><path d="M105 65V43M105 65l18 10" fill="none"/></g><g font-family="Arial" font-size="18" text-anchor="middle"><text x="100" y="158">Recall</text><text x="100" y="182">without notes</text><text x="262" y="72">One blocking</text><text x="262" y="96">gap</text><text x="447" y="72">Minimal</text><text x="447" y="96">review</text><text x="632" y="72">Correction</text><text x="632" y="96">artifact</text><text x="772" y="198">Changed-case</text><text x="772" y="222">check</text><text x="470" y="263">Record result</text><text x="470" y="287">and stop</text><text x="105" y="70">25</text></g></svg>