<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="t d"><title id="t">Touch-voltage risk concept</title><desc id="d">Black-and-white diagram of a person bridging a metal enclosure and a reference surface, with two contact points marked.</desc><rect width="900" height="500" fill="white"/><g stroke="black" fill="none" stroke-width="3"><rect x="80" y="150" width="190" height="220" rx="12"/><line x1="175" y1="150" x2="175" y2="100"/><circle cx="175" cy="85" r="16"/><circle cx="520" cy="130" r="35"/><line x1="520" y1="165" x2="520" y2="310"/><line x1="520" y1="205" x2="365" y2="235"/><line x1="520" y1="205" x2="650" y2="255"/><line x1="520" y1="310" x2="455" y2="400"/><line x1="520" y1="310" x2="585" y2="400"/><line x1="80" y1="420" x2="820" y2="420"/><circle cx="365" cy="235" r="9" fill="white"/><circle cx="585" cy="400" r="9" fill="white"/><path d="M365 235 C410 285 455 330 585 400" stroke-dasharray="10 8"/></g><g font-family="Arial" font-size="19" text-anchor="middle"><text x="175" y="265">Metal enclosure</text><text x="365" y="215">Contact point 1</text><text x="660" y="395">Contact point 2</text><text x="500" y="465">Dashed line: possible body-contact path</text></g></svg>