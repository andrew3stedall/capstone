<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Recovery gate for one bounded correction cycle</title>
  <desc id="desc">A black-and-white flow diagram showing a closed-book check leading either directly to rest or through one short correction loop, followed by a stop boundary and restart note.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="black"/></marker></defs>
  <rect x="1" y="1" width="898" height="498" fill="white" stroke="black" stroke-width="2"/>
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold">Protect recovery with a stop rule</text>
  <g fill="white" stroke="black" stroke-width="3">
    <rect x="70" y="105" width="190" height="75" rx="10"/>
    <path d="M370 95 L470 142 L370 189 L270 142 Z"/>
    <rect x="565" y="90" width="245" height="100" rx="10"/>
    <rect x="300" y="270" width="260" height="105" rx="10"/>
    <rect x="610" y="285" width="200" height="75" rx="10"/>
  </g>
  <g font-family="sans-serif" text-anchor="middle">
    <text x="165" y="138" font-size="19" font-weight="bold">Closed-book check</text>
    <text x="165" y="162" font-size="16">classify by consequence</text>
    <text x="370" y="136" font-size="18" font-weight="bold">Blocking</text>
    <text x="370" y="158" font-size="18" font-weight="bold">gap?</text>
    <text x="687" y="125" font-size="19" font-weight="bold">No</text>
    <text x="687" y="151" font-size="16">record later-review item</text>
    <text x="430" y="305" font-size="19" font-weight="bold">Yes: one correction cycle</text>
    <text x="430" y="333" font-size="16">recall · compare · correct · re-test</text>
    <text x="430" y="357" font-size="16">one topic only</text>
    <text x="710" y="318" font-size="19" font-weight="bold">STOP</text>
    <text x="710" y="343" font-size="16">restart cue + rest</text>
  </g>
  <g stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M260 142 H270"/>
    <path d="M470 142 H565"/>
    <path d="M370 189 V270"/>
    <path d="M560 322 H610"/>
    <path d="M687 190 V285"/>
  </g>
  <text x="505" y="126" font-family="sans-serif" font-size="16">No</text>
  <text x="386" y="230" font-family="sans-serif" font-size="16">Yes</text>
</svg>
