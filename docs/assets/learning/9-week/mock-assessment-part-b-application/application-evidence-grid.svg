<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc"><title id="title">Application evidence grid</title><desc id="desc">A black-and-white grid showing facts and rules entering a decision model, with assumptions separated, two alternatives compared and a bounded recommendation produced.</desc><rect width="960" height="430" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="40" y="80" width="170" height="90" rx="10"/><rect x="40" y="210" width="170" height="90" rx="10"/><rect x="270" y="145" width="180" height="100" rx="10"/><rect x="520" y="75" width="170" height="90" rx="10"/><rect x="520" y="225" width="170" height="90" rx="10"/><rect x="755" y="145" width="170" height="100" rx="10"/><path d="M210 125h60M210 255h60M450 195h70M690 120l65 60M690 270l65-60"/></g><g font-family="Arial" fill="black" text-anchor="middle"><text x="480" y="40" font-size="26" font-weight="700">Apply evidence without collapsing uncertainty</text><text x="125" y="118" font-size="19" font-weight="700">Scenario facts</text><text x="125" y="145" font-size="15">Supplied evidence</text><text x="125" y="248" font-size="19" font-weight="700">Rule records</text><text x="125" y="275" font-size="15">Provisional authority</text><text x="360" y="182" font-size="19" font-weight="700">Decision model</text><text x="360" y="210" font-size="15">Assumptions separate</text><text x="605" y="112" font-size="19" font-weight="700">Alternative A</text><text x="605" y="262" font-size="19" font-weight="700">Alternative B</text><text x="840" y="182" font-size="18" font-weight="700">Bounded</text><text x="840" y="207" font-size="18" font-weight="700">recommendation</text><text x="480" y="380" font-size="18">Compare dependencies and changed assumptions before selecting.</text></g></svg>