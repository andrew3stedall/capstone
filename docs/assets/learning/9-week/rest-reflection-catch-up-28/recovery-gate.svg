<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Recovery gate for a bounded catch-up session</title>
  <desc id="desc">A black-and-white flow from closed-book check to either rest or one correction cycle, followed by a re-test and stop.</desc>
  <rect x="20" y="20" width="860" height="320" fill="white" stroke="black" stroke-width="3"/>
  <rect x="55" y="125" width="160" height="90" rx="12" fill="white" stroke="black" stroke-width="3"/>
  <text x="135" y="160" text-anchor="middle" font-family="sans-serif" font-size="20">Closed-book</text><text x="135" y="188" text-anchor="middle" font-family="sans-serif" font-size="20">check</text>
  <polygon points="290,170 370,110 450,170 370,230" fill="white" stroke="black" stroke-width="3"/>
  <text x="370" y="164" text-anchor="middle" font-family="sans-serif" font-size="18">Blocking</text><text x="370" y="190" text-anchor="middle" font-family="sans-serif" font-size="18">gap?</text>
  <rect x="520" y="70" width="170" height="80" rx="12" fill="white" stroke="black" stroke-width="3"/>
  <text x="605" y="105" text-anchor="middle" font-family="sans-serif" font-size="18">One correction</text><text x="605" y="130" text-anchor="middle" font-family="sans-serif" font-size="18">cycle</text>
  <rect x="520" y="220" width="170" height="80" rx="12" fill="white" stroke="black" stroke-width="3"/>
  <text x="605" y="255" text-anchor="middle" font-family="sans-serif" font-size="18">Rest or schedule</text><text x="605" y="280" text-anchor="middle" font-family="sans-serif" font-size="18">minor gaps</text>
  <rect x="745" y="105" width="110" height="130" rx="12" fill="white" stroke="black" stroke-width="3"/>
  <text x="800" y="160" text-anchor="middle" font-family="sans-serif" font-size="18">Re-test</text><text x="800" y="188" text-anchor="middle" font-family="sans-serif" font-size="18">then</text><text x="800" y="216" text-anchor="middle" font-family="sans-serif" font-size="18">STOP</text>
  <path d="M215 170 H285 M450 155 L515 115 M450 190 L515 250 M690 110 H740" fill="none" stroke="black" stroke-width="3" marker-end="url(#a)"/>
  <text x="475" y="125" font-family="sans-serif" font-size="16">yes</text><text x="475" y="235" font-family="sans-serif" font-size="16">no</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="black"/></marker></defs>
</svg>