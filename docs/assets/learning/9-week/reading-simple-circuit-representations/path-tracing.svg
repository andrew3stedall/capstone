<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc"><title id="title">Circuit path tracing</title><desc id="desc">A simple source feeds two parallel branches. One branch contains an open switch and lamp; the other contains a load. A marked junction contrasts with an unconnected line crossing.</desc><rect width="800" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4"><line x1="100" y1="90" x2="100" y2="270"/><line x1="125" y1="110" x2="125" y2="250"/><line x1="125" y1="110" x2="650" y2="110"/><line x1="125" y1="250" x2="650" y2="250"/><line x1="300" y1="110" x2="300" y2="250"/><circle cx="300" cy="110" r="7" fill="black"/><circle cx="300" cy="250" r="7" fill="black"/><line x1="300" y1="160" x2="350" y2="130"/><line x1="365" y1="160" x2="430" y2="160"/><circle cx="500" cy="160" r="35"/><line x1="535" y1="160" x2="650" y2="160"/><line x1="650" y1="110" x2="650" y2="250"/><rect x="430" y="215" width="120" height="55"/><line x1="390" y1="50" x2="390" y2="100"/><line x1="365" y1="75" x2="415" y2="75"/></g><g font-family="Arial, sans-serif" font-size="21"><text x="55" y="65">Source</text><text x="320" y="145">Open switch</text><text x="468" y="168">Lamp</text><text x="460" y="248">Load</text><text x="420" y="55">Crossing, no junction</text><text x="265" y="300">Marked junctions</text></g></svg>