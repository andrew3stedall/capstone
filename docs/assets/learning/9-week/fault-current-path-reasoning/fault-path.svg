<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="t d"><title id="t">Complete fault-current path</title><desc id="d">Black-and-white loop from source through fault and protective path back to source, with evidence checkpoints.</desc><rect width="900" height="500" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="60" y="190" width="140" height="90" rx="10"/><rect x="300" y="80" width="150" height="80" rx="10"/><rect x="620" y="80" width="170" height="80" rx="10"/><rect x="620" y="330" width="170" height="80" rx="10"/><rect x="300" y="330" width="170" height="80" rx="10"/><path d="M200 220 H300"/><path d="M450 120 H620"/><path d="M705 160 V330"/><path d="M620 370 H470"/><path d="M300 370 H220 V250 H200"/><circle cx="535" cy="120" r="8"/><circle cx="705" cy="245" r="8"/><circle cx="545" cy="370" r="8"/></g><g font-family="Arial" font-size="19" text-anchor="middle"><text x="130" y="225">Source</text><text x="375" y="125">Active path</text><text x="705" y="115">Fault point</text><text x="705" y="365">Protective path</text><text x="385" y="365">Source return</text><text x="450" y="460">Each circle is an evidence checkpoint</text></g></svg>