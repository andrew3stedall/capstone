<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" role="img" aria-labelledby="title desc"><title id="title">Protective device purpose matching workflow</title><desc id="desc">Black and white boxes connected left to right from hazard, to protective outcome, to broad function, to required evidence, to verified selection.</desc><rect width="1000" height="300" fill="white"/><g fill="none" stroke="black" stroke-width="4"><rect x="30" y="95" width="150" height="90"/><rect x="220" y="95" width="170" height="90"/><rect x="430" y="95" width="170" height="90"/><rect x="640" y="95" width="150" height="90"/><rect x="830" y="95" width="140" height="90"/><path d="M180 140h40M390 140h40M600 140h40M790 140h40"/><path d="M205 130l15 10-15 10M415 130l15 10-15 10M625 130l15 10-15 10M815 130l15 10-15 10"/></g><g font-family="sans-serif" font-size="20" fill="black" text-anchor="middle"><text x="105" y="135">Hazard or</text><text x="105" y="160">condition</text><text x="305" y="135">Protective</text><text x="305" y="160">outcome</text><text x="515" y="135">Broad protective</text><text x="515" y="160">function</text><text x="715" y="135">Required</text><text x="715" y="160">evidence</text><text x="900" y="135">Verified</text><text x="900" y="160">selection</text></g><text x="500" y="245" font-family="sans-serif" font-size="22" text-anchor="middle">Do not jump from a familiar device name directly to selection</text></svg>