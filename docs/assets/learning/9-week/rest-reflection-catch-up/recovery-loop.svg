    <circle cx="105" cy="105" r="22"/><path d="M105 127v62M75 152h60M105 189l-27 42M105 189l27 42"/><path d="M55 235h100M62 218h86M65 80h35"/>
    <circle cx="300" cy="105" r="22"/><path d="M300 127v62M270 152h60M300 189l-27 42M300 189l27 42"/><path d="M255 225l35-35 25 22 35-45"/><circle cx="350" cy="167" r="7" fill="black"/>
