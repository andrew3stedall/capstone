<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc"><title id="title">Protection and conductor coordination gates</title><desc id="desc">A load and conductor proposal passes through overload, fault-current, and equipment compatibility gates before reaching a bounded coordinated proposal.</desc><rect width="980" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="30" y="125" width="170" height="100" rx="10"/><rect x="245" y="100" width="170" height="150" rx="10"/><rect x="460" y="100" width="170" height="150" rx="10"/><rect x="675" y="100" width="170" height="150" rx="10"/><rect x="870" y="125" width="90" height="100" rx="10"/><path d="M200 175h45 M415 175h45 M630 175h45 M845 175h25"/><path d="M235 167l10 8-10 8 M450 167l10 8-10 8 M665 167l10 8-10 8 M860 167l10 8-10 8"/></g><g font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black"><text x="115" y="162">Load and</text><text x="115" y="188">conductor</text><text x="330" y="150">Gate 1</text><text x="330" y="182">Overload</text><text x="330" y="208">coordination</text><text x="545" y="150">Gate 2</text><text x="545" y="182">Fault-current</text><text x="545" y="208">coordination</text><text x="760" y="150">Gate 3</text><text x="760" y="182">Equipment</text><text x="760" y="208">compatibility</text><text x="915" y="162">Bounded</text><text x="915" y="188">proposal</text></g></svg>