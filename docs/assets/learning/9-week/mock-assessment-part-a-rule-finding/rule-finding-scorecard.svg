<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Rule-finding scorecard</title>
  <desc id="desc">A black-and-white four-column diagram showing decision question, source path, applicability checks and verification status connected by arrows.</desc>
  <rect width="960" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="3">
    <rect x="35" y="85" width="190" height="220" rx="12"/><rect x="270" y="85" width="190" height="220" rx="12"/><rect x="505" y="85" width="190" height="220" rx="12"/><rect x="740" y="85" width="185" height="220" rx="12"/>
    <path d="M225 195h45M460 195h45M695 195h45"/><path d="M258 185l12 10-12 10M493 185l12 10-12 10M728 185l12 10-12 10"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="480" y="42" font-size="26" font-weight="700">Trace the rule-finding path</text>
    <text x="130" y="125" font-size="20" font-weight="700">Decision question</text><text x="130" y="165" font-size="16">What must be decided?</text><text x="130" y="195" font-size="16">What is out of scope?</text>
    <text x="365" y="125" font-size="20" font-weight="700">Source path</text><text x="365" y="165" font-size="16">Category and edition</text><text x="365" y="195" font-size="16">Search vocabulary</text>
    <text x="600" y="125" font-size="20" font-weight="700">Applicability</text><text x="600" y="165" font-size="16">Definitions and scope</text><text x="600" y="195" font-size="16">Exceptions and links</text>
    <text x="832" y="125" font-size="20" font-weight="700">Status</text><text x="832" y="165" font-size="16">Supported or provisional</text><text x="832" y="195" font-size="16">Next verification</text>
    <text x="480" y="365" font-size="18">A candidate location is not a final rule until applicability is checked.</text>
  </g>
</svg>
