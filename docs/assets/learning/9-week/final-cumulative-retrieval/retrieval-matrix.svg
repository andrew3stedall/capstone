<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc"><title id="title">Final cumulative retrieval matrix</title><desc id="desc">A black-and-white matrix linking five curriculum domains to evidence, dependencies and bounded conclusions.</desc><rect width="900" height="430" fill="white"/><g stroke="black" fill="none" stroke-width="3"><rect x="80" y="70" width="740" height="290"/><path d="M80 130h740M80 190h740M80 250h740M80 310h740M250 70v290M440 70v290M630 70v290"/></g><g font-family="Arial,sans-serif" font-size="17" fill="black" text-anchor="middle"><text x="165" y="105">Domain</text><text x="345" y="105">Evidence</text><text x="535" y="105">Dependencies</text><text x="725" y="105">Boundary</text><text x="165" y="165">Planning</text><text x="165" y="225">Protection</text><text x="165" y="285">Switching</text><text x="165" y="345">Verification / diagnosis</text><text x="345" y="165">Facts + sources</text><text x="345" y="225">Paths + coordination</text><text x="345" y="285">States + control scope</text><text x="345" y="345">Observations + results</text><text x="535" y="165">Purpose before choice</text><text x="535" y="225">Complete path</text><text x="535" y="285">All possible supplies</text><text x="535" y="345">Prerequisites first</text><text x="725" y="165">Assumptions stated</text><text x="725" y="225">No approval claim</text><text x="725" y="285">No isolation claim</text><text x="725" y="345">Qualified review needed</text></g></svg>