<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc"><title id="title">Visual evidence board</title><desc id="desc">A black-and-white board with columns for visible observations, inferences, coverage gaps, contradictions and next evidence.</desc><rect width="960" height="430" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="30" y="80" width="170" height="240" rx="10"/><rect x="215" y="80" width="170" height="240" rx="10"/><rect x="400" y="80" width="170" height="240" rx="10"/><rect x="585" y="80" width="170" height="240" rx="10"/><rect x="770" y="80" width="160" height="240" rx="10"/></g><g font-family="Arial" fill="black" text-anchor="middle"><text x="480" y="40" font-size="26" font-weight="700">Read images as bounded evidence</text><text x="115" y="120" font-size="18" font-weight="700">Visible</text><text x="115" y="145" font-size="18" font-weight="700">observations</text><text x="300" y="120" font-size="18" font-weight="700">Inference</text><text x="300" y="150" font-size="15">Label, do not hide</text><text x="485" y="120" font-size="18" font-weight="700">Coverage gaps</text><text x="485" y="150" font-size="15">What is not shown?</text><text x="670" y="120" font-size="18" font-weight="700">Contradictions</text><text x="670" y="150" font-size="15">Two explanations</text><text x="850" y="120" font-size="18" font-weight="700">Next evidence</text><text x="850" y="150" font-size="15">Safe and discriminating</text><text x="480" y="375" font-size="18">Provenance and operating state constrain every conclusion.</text></g></svg>