<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Source-state matrix</title><desc id="desc">A black-and-white matrix compares grid, generator, auxiliary and stored-energy paths across normal, transfer, shutdown and alternative-supply states. Symbols distinguish confirmed, excluded, possible and unknown paths.</desc><rect x="10" y="10" width="940" height="400" fill="white" stroke="black" stroke-width="3"/><text x="480" y="42" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold">Source-state matrix</text><g font-family="sans-serif" font-size="17" fill="black" stroke="black"><line x1="170" y1="70" x2="170" y2="350"/><line x1="350" y1="70" x2="350" y2="350"/><line x1="530" y1="70" x2="530" y2="350"/><line x1="710" y1="70" x2="710" y2="350"/><line x1="890" y1="70" x2="890" y2="350"/><line x1="40" y1="110" x2="890" y2="110"/><line x1="40" y1="170" x2="890" y2="170"/><line x1="40" y1="230" x2="890" y2="230"/><line x1="40" y1="290" x2="890" y2="290"/><line x1="40" y1="350" x2="890" y2="350"/><text x="260" y="96" text-anchor="middle" stroke="none">Normal</text><text x="440" y="96" text-anchor="middle" stroke="none">Transfer</text><text x="620" y="96" text-anchor="middle" stroke="none">Shutdown</text><text x="800" y="96" text-anchor="middle" stroke="none">Alternative</text><text x="55" y="148" stroke="none">Grid</text><text x="55" y="208" stroke="none">Generator</text><text x="55" y="268" stroke="none">Auxiliary</text><text x="55" y="328" stroke="none">Stored energy</text><text x="260" y="148" text-anchor="middle" stroke="none">✓ confirmed</text><text x="440" y="148" text-anchor="middle" stroke="none">? possible</text><text x="620" y="148" text-anchor="middle" stroke="none">× excluded</text><text x="800" y="148" text-anchor="middle" stroke="none">× excluded</text><text x="260" y="208" text-anchor="middle" stroke="none">× excluded</text><text x="440" y="208" text-anchor="middle" stroke="none">? possible</text><text x="620" y="208" text-anchor="middle" stroke="none">? unknown</text><text x="800" y="208" text-anchor="middle" stroke="none">✓ confirmed</text><text x="260" y="268" text-anchor="middle" stroke="none">✓ confirmed</text><text x="440" y="268" text-anchor="middle" stroke="none">✓ confirmed</text><text x="620" y="268" text-anchor="middle" stroke="none">✓ confirmed</text><text x="800" y="268" text-anchor="middle" stroke="none">✓ confirmed</text><text x="260" y="328" text-anchor="middle" stroke="none">? possible</text><text x="440" y="328" text-anchor="middle" stroke="none">? possible</text><text x="620" y="328" text-anchor="middle" stroke="none">? unknown</text><text x="800" y="328" text-anchor="middle" stroke="none">? possible</text></g><text x="480" y="390" text-anchor="middle" font-family="sans-serif" font-size="17">Every non-obvious cell needs evidence or an evidence request.</text></svg>