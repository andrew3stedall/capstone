<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Evidence update loop</title><desc id="desc">Three hypothesis cards are compared with new evidence, then marked strengthened, weakened or unresolved before the next question.</desc><rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="3"><rect x="45" y="55" width="210" height="70" rx="8"/><rect x="45" y="175" width="210" height="70" rx="8"/><rect x="45" y="295" width="210" height="70" rx="8"/><rect x="340" y="145" width="220" height="130" rx="12"/><rect x="650" y="55" width="200" height="70" rx="8"/><rect x="650" y="175" width="200" height="70" rx="8"/><rect x="650" y="295" width="200" height="70" rx="8"/><path d="M255 90L340 180M255 210L340 210M255 330L340 240M560 180L650 90M560 210L650 210M560 240L650 330"/></g><g font-family="sans-serif" font-size="22" text-anchor="middle" fill="black"><text x="150" y="98">Hypothesis A</text><text x="150" y="218">Hypothesis B</text><text x="150" y="338">Hypothesis C</text><text x="450" y="195">New bounded</text><text x="450" y="225">evidence</text><text x="750" y="98">Strengthened</text><text x="750" y="218">Weakened</text><text x="750" y="338">Unresolved</text></g></svg>