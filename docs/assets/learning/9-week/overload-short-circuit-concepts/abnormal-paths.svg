<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Overload and short-circuit path comparison</title><desc id="desc">Two black and white circuit sketches. The upper retains the intended load path with excessive demand. The lower shows an unintended bypass path around the load.</desc><rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="4"><rect x="55" y="60" width="110" height="90"/><rect x="535" y="60" width="150" height="90"/><path d="M165 105H535M685 105H815V175H110V150"/><path d="M290 75v60M330 75v60M370 75v60"/><rect x="55" y="250" width="110" height="90"/><rect x="535" y="250" width="150" height="90"/><path d="M165 295H535M685 295H815V365H110V340"/><path d="M360 295V365" stroke-dasharray="10 8"/></g><g font-family="sans-serif" font-size="22" fill="black"><text x="55" y="35">A. Intended path retained; demand increased</text><text x="555" y="115">Load</text><text x="300" y="165">Overload-like concept</text><text x="55" y="225">B. Unintended bypass path introduced</text><text x="555" y="305">Load</text><text x="260" y="400">Short-circuit-like concept</text></g></svg>