<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc"><title id="title">Verification recovery gate</title><desc id="desc">A black-and-white recovery loop limits study to closed-book diagnosis, one blocking gap, one correction and one changed-example retest before stopping.</desc><rect width="960" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="3"><circle cx="115" cy="180" r="65"/><rect x="235" y="120" width="180" height="120" rx="12"/><rect x="475" y="120" width="180" height="120" rx="12"/><rect x="715" y="120" width="180" height="120" rx="12"/><path d="M180 180h55M415 180h60M655 180h60"/><path d="M225 170l10 10-10 10M465 170l10 10-10 10M705 170l10 10-10 10"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="480" y="55" font-size="28" font-weight="700">One-gap recovery cycle</text><text x="115" y="165" font-size="20" font-weight="700">Closed-book</text><text x="115" y="191" font-size="18">diagnosis</text><text x="325" y="158" font-size="21" font-weight="700">Choose one</text><text x="325" y="187" font-size="18">blocking gap</text><text x="325" y="216" font-size="16">not a guessed value</text><text x="565" y="158" font-size="21" font-weight="700">Correct once</text><text x="565" y="187" font-size="18">small artifact</text><text x="565" y="216" font-size="16">targeted review only</text><text x="805" y="151" font-size="21" font-weight="700">Changed example</text><text x="805" y="181" font-size="18">re-test</text><text x="805" y="211" font-size="18">record + stop</text><text x="480" y="315" font-size="18">25-minute boundary protects consolidation and rest.</text></g></svg>