<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Completion and technical-review boundary</title><desc id="desc">A black-and-white diagram separating completed learning evidence from unresolved reference checks and qualified technical approval.</desc><rect width="900" height="420" fill="white"/><g stroke="black" stroke-width="3" fill="none"><rect x="55" y="85" width="300" height="240" rx="18"/><rect x="545" y="85" width="300" height="240" rx="18"/><path d="M450 55v310" stroke-dasharray="12 9"/><path d="M355 205h70"/><path d="M475 205h70"/></g><g font-family="Arial,sans-serif" fill="black" text-anchor="middle"><text x="205" y="125" font-size="25" font-weight="bold">Completed learning</text><text x="205" y="175" font-size="19">Modules and artifacts</text><text x="205" y="215" font-size="19">Retrieval and application</text><text x="205" y="255" font-size="19">Reflection evidence</text><text x="205" y="295" font-size="19">Recorded limitations</text><text x="695" y="125" font-size="25" font-weight="bold">Qualified review</text><text x="695" y="175" font-size="19">Authorised sources</text><text x="695" y="215" font-size="19">Exact technical checks</text><text x="695" y="255" font-size="19">Formal decisions</text><text x="695" y="295" font-size="19">Approval or competence</text><text x="450" y="395" font-size="20" font-weight="bold">Completion does not cross this boundary</text></g></svg>