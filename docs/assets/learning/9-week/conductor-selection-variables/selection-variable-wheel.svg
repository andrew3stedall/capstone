<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Conductor-selection variable wheel</title>
  <desc id="desc">A central bounded selection box is surrounded by six labelled evidence boxes: load, installation, environment, protection, voltage drop, and terminations.</desc>
  <rect width="900" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="3">
    <rect x="340" y="205" width="220" height="110" rx="12"/>
    <rect x="70" y="55" width="190" height="70" rx="10"/>
    <rect x="355" y="35" width="190" height="70" rx="10"/>
    <rect x="640" y="55" width="190" height="70" rx="10"/>
    <rect x="70" y="395" width="190" height="70" rx="10"/>
    <rect x="355" y="415" width="190" height="70" rx="10"/>
    <rect x="640" y="395" width="190" height="70" rx="10"/>
    <path d="M260 90 L365 215 M450 105 L450 205 M640 90 L535 215 M260 430 L365 305 M450 415 L450 315 M640 430 L535 305"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="black">
    <text x="450" y="248">Bounded conductor</text><text x="450" y="278">selection</text>
    <text x="165" y="98">Load basis</text>
    <text x="450" y="78">Installation method</text>
    <text x="735" y="98">Environment</text>
    <text x="165" y="438">Protection</text>
    <text x="450" y="458">Voltage drop</text>
    <text x="735" y="438">Terminations</text>
  </g>
</svg>
