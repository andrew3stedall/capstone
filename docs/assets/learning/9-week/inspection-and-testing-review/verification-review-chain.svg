<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc"><title id="title">Verification review chain</title><desc id="desc">A black-and-white eight-stage chain from scope and claims through inspection, test purpose, dependency order, expected observations, contradictions and bounded conclusions.</desc><rect width="1000" height="360" fill="white"/><g fill="white" stroke="black" stroke-width="3" font-family="sans-serif" font-size="15" text-anchor="middle"><rect x="20" y="135" width="105" height="70" rx="9"/><text x="72" y="164" fill="black">Scope and</text><text x="72" y="186" fill="black">exclusions</text><rect x="145" y="135" width="105" height="70" rx="9"/><text x="197" y="164" fill="black">Claims to</text><text x="197" y="186" fill="black">evidence</text><rect x="270" y="135" width="105" height="70" rx="9"/><text x="322" y="164" fill="black">Inspection</text><text x="322" y="186" fill="black">coverage</text><rect x="395" y="135" width="105" height="70" rx="9"/><text x="447" y="164" fill="black">Test</text><text x="447" y="186" fill="black">purposes</text><rect x="520" y="135" width="105" height="70" rx="9"/><text x="572" y="164" fill="black">Dependency</text><text x="572" y="186" fill="black">order</text><rect x="645" y="135" width="105" height="70" rx="9"/><text x="697" y="164" fill="black">Expected</text><text x="697" y="186" fill="black">observations</text><rect x="770" y="135" width="105" height="70" rx="9"/><text x="822" y="164" fill="black">Contradictions</text><text x="822" y="186" fill="black">and gaps</text><rect x="895" y="135" width="90" height="70" rx="9"/><text x="940" y="164" fill="black">Bounded</text><text x="940" y="186" fill="black">conclusion</text></g><g stroke="black" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M125 170H145"/><path d="M250 170H270"/><path d="M375 170H395"/><path d="M500 170H520"/><path d="M625 170H645"/><path d="M750 170H770"/><path d="M875 170H895"/></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="black"/></marker></defs><text x="500" y="285" font-family="sans-serif" font-size="18" text-anchor="middle">Keep intent, observation, result, interpretation and acceptance criteria separate.</text></svg>