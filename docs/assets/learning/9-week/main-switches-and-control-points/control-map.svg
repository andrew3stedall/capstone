<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Control-point scope map</title><desc id="desc">A black-and-white source-to-load diagram with a broad control, a local control and a dotted exception path from another possible source.</desc><rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><rect x="45" y="160" width="130" height="90" rx="12"/><rect x="235" y="145" width="150" height="120" rx="12"/><rect x="455" y="160" width="150" height="90" rx="12"/><rect x="675" y="160" width="150" height="90" rx="12"/><path d="M175 205h60m150 0h70m150 0h70"/><path d="M310 145v120m-28-60h56"/><path d="M530 160v90m-25-45h50"/><circle cx="110" cy="75" r="36"/><path d="M110 111v40m0-20l-36 28m36-28l36 28"/><path stroke-dasharray="10 10" d="M110 111C260 35 520 35 750 160"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="110" y="195" font-size="22">known source</text><text x="310" y="125" font-size="22">broader control</text><text x="530" y="145" font-size="22">local control</text><text x="750" y="195" font-size="22">load</text><text x="110" y="35" font-size="20">possible exception source</text><text x="450" y="65" font-size="18">dotted path must be checked</text><text x="450" y="340" font-size="22">map actual scope, not label prominence</text></g></svg>