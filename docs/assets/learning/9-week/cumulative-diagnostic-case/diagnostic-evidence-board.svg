<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Cumulative diagnostic evidence board</title>
  <desc id="desc">A black-and-white board links a case frame, evidence inventory, three hypotheses, a stop gate, traceability record and bounded communication.</desc>
  <rect width="900" height="360" fill="white"/>
  <g fill="white" stroke="black" stroke-width="3" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">
    <rect x="30" y="35" width="160" height="60" rx="8"/><text x="110" y="60">Case frame</text><text x="110" y="81">scope and state</text>
    <rect x="260" y="35" width="170" height="60" rx="8"/><text x="345" y="60">Evidence inventory</text><text x="345" y="81">identity and limits</text>
    <rect x="500" y="20" width="160" height="52" rx="8"/><text x="580" y="51">Hypothesis A</text>
    <rect x="500" y="90" width="160" height="52" rx="8"/><text x="580" y="121">Hypothesis B</text>
    <rect x="500" y="160" width="160" height="52" rx="8"/><text x="580" y="191">Hypothesis C</text>
    <rect x="715" y="90" width="150" height="62" rx="8"/><text x="790" y="116">Evidence update</text><text x="790" y="137">and stop gate</text>
    <rect x="470" y="270" width="190" height="58" rx="8"/><text x="565" y="295">Traceability register</text><text x="565" y="316">and uncertainty</text>
    <rect x="710" y="270" width="160" height="58" rx="8"/><text x="790" y="295">Bounded</text><text x="790" y="316">communication</text>
  </g>
  <g stroke="black" stroke-width="3" fill="none" marker-end="url(#a)">
    <path d="M190 65H260"/><path d="M430 65L500 46"/><path d="M430 65L500 116"/><path d="M430 65L500 186"/><path d="M660 46L715 105"/><path d="M660 116H715"/><path d="M660 186L715 137"/><path d="M790 152V240L565 270"/><path d="M660 299H710"/>
  </g>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="black"/></marker></defs>
</svg>