<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Interleaved retrieval board</title><desc id="desc">A black-and-white four-quadrant board separates control purpose, source state, fault path and evidence sufficiency. Arrows lead from each quadrant to a bounded conclusion and confidence check.</desc><rect x="10" y="10" width="940" height="400" fill="white" stroke="black" stroke-width="3"/><text x="480" y="42" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold">Interleaved retrieval board</text><g fill="white" stroke="black" stroke-width="3"><rect x="70" y="80" width="300" height="100"/><rect x="590" y="80" width="300" height="100"/><rect x="70" y="230" width="300" height="100"/><rect x="590" y="230" width="300" height="100"/><circle cx="480" cy="205" r="78"/></g><g font-family="sans-serif" font-size="19" fill="black"><text x="220" y="125" text-anchor="middle">Control purpose</text><text x="220" y="150" text-anchor="middle">What is the device for?</text><text x="740" y="125" text-anchor="middle">Source state</text><text x="740" y="150" text-anchor="middle">Which paths can energise?</text><text x="220" y="275" text-anchor="middle">Fault path</text><text x="220" y="300" text-anchor="middle">Is the loop complete?</text><text x="740" y="275" text-anchor="middle">Evidence sufficiency</text><text x="740" y="300" text-anchor="middle">What remains unknown?</text><text x="480" y="195" text-anchor="middle">Bounded</text><text x="480" y="220" text-anchor="middle">conclusion</text><text x="480" y="245" text-anchor="middle">+ confidence</text></g><g stroke="black" stroke-width="3" fill="none"><line x1="370" y1="130" x2="420" y2="170"/><line x1="590" y1="130" x2="540" y2="170"/><line x1="370" y1="280" x2="420" y2="240"/><line x1="590" y1="280" x2="540" y2="240"/></g><text x="480" y="380" text-anchor="middle" font-family="sans-serif" font-size="17">Choose the distinction before choosing the workflow.</text></svg>