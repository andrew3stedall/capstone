<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">One device needs separate proof for each switching function</title>
  <desc id="desc">A black-and-white stick figure points to one switch symbol below four separate evidence gates labelled functional, isolation, emergency and mechanical maintenance. Only the functional gate has a complete evidence line; the others remain dashed.</desc>
  <rect width="960" height="460" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="105" cy="205" r="28"/>
    <path d="M105 233v105M105 262l-48 40M105 262l70 10M105 338l-38 62M105 338l44 62"/>
    <circle cx="255" cy="250" r="42"/>
    <path d="M230 275l50-50"/>
    <path d="M175 272l35-12"/>
    <rect x="385" y="55" width="185" height="72" rx="10"/>
    <rect x="650" y="55" width="185" height="72" rx="10"/>
    <rect x="385" y="245" width="185" height="72" rx="10"/>
    <rect x="650" y="245" width="185" height="72" rx="10"/>
    <path d="M297 230L385 91"/>
    <path d="M297 240L650 91" stroke-dasharray="14 13"/>
    <path d="M297 260L385 281" stroke-dasharray="14 13"/>
    <path d="M297 270L650 281" stroke-dasharray="14 13"/>
    <path d="M548 91l14 14 25-31"/>
    <path d="M807 77l25 25M832 77l-25 25"/>
    <path d="M542 267l25 25M567 267l-25 25"/>
    <path d="M807 267l25 25M832 267l-25 25"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="480" y="34" font-size="28" font-weight="700">ONE DEVICE DOES NOT CREATE ONE SHARED PROOF</text>
    <text x="255" y="325" font-size="18" font-weight="700">DEVICE</text>
    <text x="477" y="99" font-size="18" font-weight="700">FUNCTIONAL</text>
    <text x="742" y="99" font-size="18" font-weight="700">ISOLATION</text>
    <text x="477" y="289" font-size="18" font-weight="700">EMERGENCY</text>
    <text x="742" y="276" font-size="16" font-weight="700">MECHANICAL</text>
    <text x="742" y="298" font-size="16" font-weight="700">MAINTENANCE</text>
    <text x="480" y="435" font-size="22">Test each claimed function against its own purpose, boundary and evidence.</text>
  </g>
</svg>
