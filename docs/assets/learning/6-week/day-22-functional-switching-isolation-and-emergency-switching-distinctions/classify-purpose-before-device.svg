<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-labelledby="title desc"><title id="title">Classify purpose before device</title><desc id="desc">A stick figure sorts control, isolation and emergency purposes before considering a switch.</desc><rect width="800" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round"><circle cx="100" cy="105" r="28"/><line x1="100" y1="133" x2="100" y2="240"/><line x1="100" y1="170" x2="55" y2="210"/><line x1="100" y1="170" x2="155" y2="210"/><line x1="100" y1="240" x2="65" y2="320"/><line x1="100" y1="240" x2="140" y2="320"/><rect x="230" y="55" width="150" height="70"/><rect x="230" y="150" width="150" height="70"/><rect x="230" y="245" width="150" height="70"/><line x1="380" y1="90" x2="500" y2="185"/><line x1="380" y1="185" x2="500" y2="185"/><line x1="380" y1="280" x2="500" y2="185"/><rect x="500" y="105" width="180" height="160"/><circle cx="590" cy="185" r="35"/><line x1="555" y1="185" x2="625" y2="185"/></g><text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">Purpose and hazard come before device appearance</text></svg>