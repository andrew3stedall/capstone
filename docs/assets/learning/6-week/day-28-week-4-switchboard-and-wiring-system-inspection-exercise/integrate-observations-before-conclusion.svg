<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc"><title id="title">Integrate observations before conclusion</title><desc id="desc">A black-and-white stick figure combines source, switchboard, route and circuit-role cards into one evidence ledger before a conclusion gate.</desc><rect width="900" height="460" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="75" cy="105" r="27"/><path d="M75 132v115M75 165l-42 42M75 165l58 35M75 247l-36 77M75 247l42 77"/><rect x="190" y="55" width="145" height="75" rx="8"/><rect x="190" y="155" width="145" height="75" rx="8"/><rect x="190" y="255" width="145" height="75" rx="8"/><rect x="395" y="105" width="230" height="210" rx="12"/><rect x="695" y="150" width="140" height="120" rx="12"/><path d="M335 92l60 65M335 192l60 35M335 292l60-5M625 210h70"/><path d="M675 195l20 15-20 15"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="262" y="100" font-size="18">SOURCE MAP</text><text x="262" y="200" font-size="18">BOARD + ROUTE</text><text x="262" y="300" font-size="18">CIRCUIT ROLES</text><text x="510" y="145" font-size="20" font-weight="700">EVIDENCE LEDGER</text><text x="510" y="185" font-size="17">observed</text><text x="510" y="220" font-size="17">inferred</text><text x="510" y="255" font-size="17">unresolved</text><text x="765" y="195" font-size="18">BOUNDED</text><text x="765" y="225" font-size="18">CONCLUSION</text><text x="450" y="420" font-size="25" font-weight="700">INTEGRATE THE EVIDENCE; DO NOT OUTRUN IT</text></g></svg>