    <text x="402" y="300" font-size="19" font-weight="700">DEPENDENCY</text>
    <text x="577" y="300" font-size="19" font-weight="700">INTERACTION</text>
    <text x="752" y="300" font-size="19" font-weight="700">BOUNDARY</text>
