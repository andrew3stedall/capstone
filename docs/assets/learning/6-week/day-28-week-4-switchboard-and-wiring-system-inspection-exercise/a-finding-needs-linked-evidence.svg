    <rect x="680" y="115" width="145" height="145" rx="12"/>
    <path d="M300 188h30M475 188h30M650 188h30"/>
    <path d="M315 175l15 13-15 13M490 175l15 13-15 13M665 175l15 13-15 13"/>
    <circle cx="227" cy="175" r="22"/>
