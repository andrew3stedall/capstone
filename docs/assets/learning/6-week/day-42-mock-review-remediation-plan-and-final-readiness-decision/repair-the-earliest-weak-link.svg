<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Repair the earliest weak link</title><desc id="desc">A black-and-white stick figure traces four incorrect answer cards back to one cracked dependency block, then follows an arrow to a changed transfer scenario.</desc><rect width="960" height="540" fill="white"/><g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><circle cx="100" cy="150" r="30"/><path d="M100 180v110M100 210l-48 48M100 210l65 30M100 290l-38 78M100 290l44 78"/><rect x="235" y="110" width="120" height="70" rx="8"/><rect x="235" y="200" width="120" height="70" rx="8"/><rect x="235" y="290" width="120" height="70" rx="8"/><rect x="235" y="380" width="120" height="70" rx="8"/><path d="M355 145l120 95M355 235l120 20M355 325l120-55M355 415l120-135"/><rect x="475" y="205" width="130" height="100" rx="10"/><path d="M525 205l22 40-18 22 24 38"/><path d="M605 255h115"/><path d="M700 235l25 20-25 20"/><rect x="725" y="185" width="180" height="140" rx="12"/></g><g font-family="Arial,Helvetica,sans-serif" fill="black" text-anchor="middle"><text x="480" y="55" font-size="32" font-weight="700">REPAIR THE EARLIEST WEAK LINK</text><text x="295" y="150" font-size="20">ERROR 1</text><text x="295" y="240" font-size="20">ERROR 2</text><text x="295" y="330" font-size="20">ERROR 3</text><text x="295" y="420" font-size="20">ERROR 4</text><text x="540" y="340" font-size="22">WEAK DEPENDENCY</text><text x="815" y="250" font-size="22">CHANGED TRANSFER</text><text x="480" y="495" font-size="25">Correct the cause, then prove the repair somewhere new.</text></g></svg>