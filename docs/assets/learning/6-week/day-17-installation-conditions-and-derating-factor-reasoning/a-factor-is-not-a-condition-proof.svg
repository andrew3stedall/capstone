<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">A factor is not proof of an installation condition</title>
  <desc id="desc">Black-and-white stick figures compare an unsupported correction factor with a route evidence map. The first learner points at a factor with a question mark. The second traces cable sections through grouping, insulation and heat conditions before using authorised data.</desc>
  <rect width="900" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="450" y1="35" x2="450" y2="350" stroke-dasharray="12 12"/>
    <circle cx="145" cy="115" r="30"/>
    <line x1="145" y1="145" x2="145" y2="250"/>
    <line x1="145" y1="175" x2="95" y2="215"/>
    <line x1="145" y1="175" x2="205" y2="190"/>
    <line x1="145" y1="250" x2="105" y2="315"/>
    <line x1="145" y1="250" x2="190" y2="315"/>
    <rect x="245" y="120" width="130" height="90" rx="8"/>
    <path d="M205 190 L245 165"/>
    <path d="M300 75 q35 -35 70 0 q15 20 -15 42 q-20 14 -20 35"/>
    <circle cx="335" cy="175" r="4" fill="black"/>
    <circle cx="570" cy="105" r="30"/>
    <line x1="570" y1="135" x2="570" y2="240"/>
    <line x1="570" y1="170" x2="520" y2="215"/>
    <line x1="570" y1="170" x2="625" y2="205"/>
    <line x1="570" y1="240" x2="530" y2="305"/>
    <line x1="570" y1="240" x2="615" y2="305"/>
    <path d="M625 205 C675 190 680 135 725 145 S790 215 835 195"/>
    <rect x="650" y="85" width="55" height="55"/>
    <line x1="665" y1="95" x2="665" y2="130"/>
    <line x1="680" y1="95" x2="680" y2="130"/>
    <line x1="695" y1="95" x2="695" y2="130"/>
    <path d="M735 125 l15 -25 l15 25 l15 -25 l15 25"/>
    <circle cx="820" cy="125" r="22"/>
    <line x1="820" y1="88" x2="820" y2="72"/>
    <line x1="850" y1="97" x2="862" y2="85"/>
    <line x1="790" y1="97" x2="778" y2="85"/>
    <rect x="675" y="245" width="150" height="65" rx="8"/>
    <path d="M650 245 L625 220"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="225" y="40" font-size="25" font-weight="700">Factor first</text>
    <text x="310" y="158" font-size="24">0.80</text>
    <text x="225" y="365" font-size="21">A number cannot prove</text>
    <text x="225" y="393" font-size="21">the condition applies.</text>
    <text x="675" y="40" font-size="25" font-weight="700">Conditions first</text>
    <text x="677" y="78" font-size="17">grouping</text>
    <text x="760" y="78" font-size="17">insulation</text>
    <text x="820" y="165" font-size="17">heat</text>
    <text x="750" y="272" font-size="19">authorised</text>
    <text x="750" y="296" font-size="19">method</text>
    <text x="675" y="365" font-size="21">Map evidence, then select</text>
    <text x="675" y="393" font-size="21">the applicable method.</text>
  </g>
</svg>
