    <path d="M845 325h80M845 347h58"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="480" y="48" font-size="30" font-weight="700">A BOUNDARY NEEDS FIVE EVIDENCE LINKS</text>
    <text x="200" y="300" font-size="18" font-weight="700">SOURCE</text>
    <text x="350" y="300" font-size="18" font-weight="700">DATUM</text>
    <text x="500" y="300" font-size="18" font-weight="700">BOUNDARY</text>
    <text x="650" y="300" font-size="18" font-weight="700">EQUIPMENT</text>
    <text x="800" y="300" font-size="18" font-weight="700">PROTECTION</text>
    <text x="480" y="425" font-size="21">A missing or changed link reopens the conclusion.</text>
  </g>
</svg>
