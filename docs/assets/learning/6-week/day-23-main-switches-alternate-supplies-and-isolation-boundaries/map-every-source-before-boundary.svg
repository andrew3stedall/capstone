<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-labelledby="title desc"><title id="title">Map every source before the boundary</title><desc id="desc">A stick figure traces grid and battery sources into a boundary map rather than trusting one main-switch label.</desc><rect width="800" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round"><circle cx="100" cy="105" r="28"/><line x1="100" y1="133" x2="100" y2="240"/><line x1="100" y1="170" x2="55" y2="210"/><line x1="100" y1="170" x2="155" y2="210"/><line x1="100" y1="240" x2="65" y2="320"/><line x1="100" y1="240" x2="140" y2="320"/><rect x="220" y="55" width="120" height="70"/><rect x="220" y="245" width="120" height="70"/><rect x="430" y="120" width="150" height="130"/><line x1="340" y1="90" x2="430" y2="155"/><line x1="340" y1="280" x2="430" y2="215"/><rect x="650" y="145" width="100" height="80"/><line x1="580" y1="185" x2="650" y2="185"/></g><text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">Map every source before claiming a boundary</text></svg>