<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc"><title id="title">Link three values with evidence</title><desc id="desc">A stick-figure learner connects load, device and conductor cards through labelled evidence gates.</desc><rect width="900" height="520" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="110" cy="120" r="34"/><path d="M110 154v115M110 185l-55 45M110 185l65 20M110 269l-40 85M110 269l48 85"/><rect x="225" y="160" width="150" height="90" rx="8"/><rect x="455" y="160" width="150" height="90" rx="8"/><rect x="685" y="160" width="150" height="90" rx="8"/><path d="M375 205h80M605 205h80"/><path d="M435 185l20 20-20 20M665 185l20 20-20 20"/></g><g font-family="Arial, sans-serif" font-size="23" fill="black" text-anchor="middle"><text x="300" y="205">LOAD</text><text x="530" y="205">DEVICE</text><text x="760" y="205">CONDUCTOR</text><text x="415" y="145">EVIDENCE</text><text x="645" y="145">EVIDENCE</text><text x="450" y="420">The relationship is only as strong as its missing evidence.</text></g></svg>