<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc"><title id="title">Screen location features before classification</title><desc id="desc">A black-and-white stick figure sorts cards labelled moisture, heat, dust, access and use into a screening board before an authorised-source verification gate.</desc><rect width="900" height="460" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="80" cy="105" r="27"/><path d="M80 132v115M80 165l-44 44M80 165l60 35M80 247l-38 78M80 247l43 78"/><rect x="175" y="60" width="145" height="58" rx="8"/><rect x="175" y="135" width="145" height="58" rx="8"/><rect x="175" y="210" width="145" height="58" rx="8"/><rect x="175" y="285" width="145" height="58" rx="8"/><rect x="390" y="85" width="220" height="245" rx="12"/><rect x="685" y="150" width="145" height="115" rx="12"/><path d="M320 89l70 55M320 164l70 30M320 239l70 5M320 314l70-20M610 205h75"/><path d="M665 190l20 15-20 15"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="247" y="96" font-size="17">MOISTURE</text><text x="247" y="171" font-size="17">HEAT / DUST</text><text x="247" y="246" font-size="17">ACCESS</text><text x="247" y="321" font-size="17">USE</text><text x="500" y="130" font-size="21" font-weight="700">SCREEN</text><text x="500" y="175" font-size="17">observed features</text><text x="500" y="210" font-size="17">candidate triggers</text><text x="500" y="245" font-size="17">missing evidence</text><text x="500" y="280" font-size="17">affected decisions</text><text x="757" y="195" font-size="18">AUTHORISED</text><text x="757" y="225" font-size="18">SOURCE GATE</text><text x="450" y="420" font-size="24" font-weight="700">FEATURES TRIGGER A CHECK; THEY DO NOT PROVE A CLASSIFICATION</text></g></svg>