<svg xmlns="http://www.w3.org/2000/svg" width="840" height="440" viewBox="0 0 840 440" role="img" aria-labelledby="title desc"><title id="title">Separate inspection evidence from test evidence</title><desc id="desc">A black-line stick figure sorts evidence cards into visual inspection, authorised testing and unresolved evidence trays before writing a bounded record.</desc><rect width="840" height="440" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="105" cy="90" r="28"/><path d="M105 118v100m0-62-50 40m50-40 58 32m-58 30-42 82m42-82 47 82"/><rect x="225" y="55" width="110" height="58"/><rect x="225" y="135" width="110" height="58"/><rect x="225" y="215" width="110" height="58"/><path d="M335 84h95m-95 80h95m-95 80h95"/><rect x="430" y="45" width="160" height="100" rx="10"/><rect x="430" y="170" width="160" height="100" rx="10"/><rect x="430" y="295" width="160" height="100" rx="10"/><rect x="650" y="130" width="150" height="180" rx="10"/><path d="M680 175h90m-90 45h90m-90 45h65"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="510" y="90" font-size="22">VISUAL</text><text x="510" y="115" font-size="22">EVIDENCE</text><text x="510" y="215" font-size="22">AUTHORISED</text><text x="510" y="242" font-size="22">TESTING</text><text x="510" y="340" font-size="22">UNRESOLVED</text><text x="510" y="367" font-size="22">EVIDENCE</text><text x="725" y="105" font-size="22">BOUNDED RECORD</text><text x="420" y="425" font-size="23">Do not turn visible familiarity into an unmeasured result.</text></g></svg>