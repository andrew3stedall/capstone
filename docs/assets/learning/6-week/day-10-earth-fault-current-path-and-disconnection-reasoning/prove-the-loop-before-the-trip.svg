<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Prove the loop before the trip</title>
  <desc id="desc">Black-and-white stick-figure cartoon. A learner follows arrows around a complete source, fault, protective return and source loop, then checks separate continuity and device evidence cards before pointing to a protective device.</desc>
  <rect width="960" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="105" cy="106" r="28"/>
    <line x1="105" y1="134" x2="105" y2="220"/>
    <line x1="105" y1="160" x2="58" y2="190"/>
    <line x1="105" y1="160" x2="158" y2="178"/>
    <line x1="105" y1="220" x2="72" y2="278"/>
    <line x1="105" y1="220" x2="140" y2="278"/>
    <rect x="178" y="66" width="130" height="80"/>
    <path d="M198 126 C220 86 248 86 272 126"/>
    <text x="243" y="112" font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black" stroke="none">SOURCE</text>
    <rect x="420" y="62" width="150" height="90"/>
    <text x="495" y="100" font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black" stroke="none">FAULT AT</text>
    <text x="495" y="126" font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black" stroke="none">ENCLOSURE</text>
    <rect x="684" y="62" width="150" height="90"/>
    <text x="759" y="100" font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black" stroke="none">RETURN TO</text>
    <text x="759" y="126" font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="black" stroke="none">SOURCE</text>
    <path d="M308 106 H420"/>
    <path d="M402 95 L420 106 L402 117"/>
    <path d="M570 106 H684"/>
    <path d="M666 95 L684 106 L666 117"/>
    <path d="M759 152 V212 H243 V146"/>
    <path d="M232 164 L243 146 L254 164"/>
    <rect x="320" y="258" width="175" height="88"/>
    <text x="407" y="292" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black" stroke="none">CONTINUITY +</text>
    <text x="407" y="318" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black" stroke="none">LOOP EVIDENCE</text>
    <rect x="555" y="258" width="175" height="88"/>
    <text x="642" y="292" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black" stroke="none">DEVICE</text>
    <text x="642" y="318" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black" stroke="none">EVIDENCE</text>
    <path d="M495 302 H555"/>
    <path d="M537 291 L555 302 L537 313"/>
    <rect x="790" y="258" width="130" height="88" rx="8"/>
    <text x="855" y="292" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black" stroke="none">BOUNDED</text>
    <text x="855" y="318" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="black" stroke="none">OUTCOME</text>
    <path d="M730 302 H790"/>
    <path d="M772 291 L790 302 L772 313"/>
  </g>
  <text x="480" y="392" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="black">A complete path does not by itself prove protective operation.</text>
</svg>
