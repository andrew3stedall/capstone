<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Complete every evidence gate</title><desc id="desc">A black-and-white stick figure follows a path through design, inspection, verification and review gates, each connected to an evidence register.</desc><rect width="960" height="540" fill="white"/><g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><circle cx="95" cy="160" r="30"/><path d="M95 190v110M95 220l-45 45M95 220l62 28M95 300l-35 75M95 300l42 75"/><rect x="190" y="120" width="145" height="110" rx="10"/><rect x="385" y="120" width="145" height="110" rx="10"/><rect x="580" y="120" width="145" height="110" rx="10"/><rect x="775" y="120" width="145" height="110" rx="10"/><path d="M335 175h50M530 175h50M725 175h50"/><rect x="355" y="335" width="250" height="100" rx="12"/><path d="M262 230l145 105M458 230v105M652 230L555 335M847 230L600 370" stroke-dasharray="12 10"/></g><g font-family="Arial,Helvetica,sans-serif" fill="black" text-anchor="middle"><text x="480" y="55" font-size="32" font-weight="700">COMPLETE EVERY EVIDENCE GATE</text><text x="262" y="180" font-size="23">DESIGN</text><text x="458" y="180" font-size="23">INSPECTION</text><text x="652" y="180" font-size="23">VERIFY</text><text x="847" y="180" font-size="23">REVIEW</text><text x="480" y="395" font-size="24">EVIDENCE REGISTER</text><text x="480" y="490" font-size="25">A later answer cannot repair an unsupported earlier assumption.</text></g></svg>