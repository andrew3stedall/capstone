<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">A mock conclusion needs six linked evidence gates</title>
  <desc id="desc">A black-and-white stick figure follows six linked cards labelled scope, source, design, inspection, verification and diagnosis toward a bounded conclusion. A score bubble is shown below and cannot bypass the linked gates.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="62" cy="308" r="23"/>
    <path d="M62 331v82M62 356l-29 30M62 356l43 1M62 413l-25 52M62 413l34 52"/>
    <rect x="118" y="88" width="114" height="130" rx="12"/>
    <rect x="252" y="88" width="114" height="130" rx="12"/>
    <rect x="386" y="88" width="114" height="130" rx="12"/>
    <rect x="520" y="88" width="114" height="130" rx="12"/>
    <rect x="654" y="88" width="114" height="130" rx="12"/>
    <rect x="788" y="88" width="114" height="130" rx="12"/>
    <path d="M232 153h20M366 153h20M500 153h20M634 153h20M768 153h20"/>
    <path d="M240 142l12 11-12 11M374 142l12 11-12 11M508 142l12 11-12 11M642 142l12 11-12 11M776 142l12 11-12 11"/>
    <path d="M845 218v74"/>
    <rect x="662" y="292" width="270" height="112" rx="12"/>
    <ellipse cx="370" cy="365" rx="120" ry="58"/>
    <path d="M490 365h172" stroke-dasharray="14 10"/>
    <path d="M508 353l-18 12 18 12"/>
    <path d="M330 341l80 48M410 341l-80 48"/>
    <path d="M791 323v50M766 348h50"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="480" y="44" font-size="29" font-weight="700">A MOCK CONCLUSION NEEDS SIX LINKED EVIDENCE GATES</text>
    <text x="175" y="128" font-size="18" font-weight="700">SCOPE</text>
    <text x="175" y="164" font-size="15">task and stop</text><text x="175" y="188" font-size="15">conditions</text>
    <text x="309" y="128" font-size="18" font-weight="700">SOURCE</text>
    <text x="309" y="164" font-size="15">identity and</text><text x="309" y="188" font-size="15">provenance</text>
    <text x="443" y="128" font-size="18" font-weight="700">DESIGN</text>
    <text x="443" y="164" font-size="15">traceable</text><text x="443" y="188" font-size="15">dependencies</text>
    <text x="577" y="128" font-size="18" font-weight="700">INSPECTION</text>
    <text x="577" y="164" font-size="15">observation not</text><text x="577" y="188" font-size="15">assumption</text>
    <text x="711" y="128" font-size="18" font-weight="700">VERIFY</text>
    <text x="711" y="164" font-size="15">purpose and</text><text x="711" y="188" font-size="15">result restraint</text>
    <text x="845" y="128" font-size="18" font-weight="700">DIAGNOSE</text>
    <text x="845" y="164" font-size="15">competing</text><text x="845" y="188" font-size="15">hypotheses</text>
    <text x="797" y="331" font-size="19" font-weight="700">BOUNDED CONCLUSION</text>
    <text x="797" y="365" font-size="15">claim grade matches evidence;</text><text x="797" y="388" font-size="15">unresolved items escalate</text>
    <text x="370" y="350" font-size="18" font-weight="700">HIGH SUBTOTAL</text>
    <text x="370" y="389" font-size="15">cannot bypass a missing gate</text>
    <text x="480" y="505" font-size="18">A critical safety, evidence or authority error overrides the numerical score.</text>
  </g>
</svg>
