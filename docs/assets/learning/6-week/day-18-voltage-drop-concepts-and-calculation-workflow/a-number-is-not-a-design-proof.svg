<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">A number is not a design proof</title>
  <desc id="desc">A stick-figure learner holds a calculator showing a precise result while three blank evidence cards labelled current, length basis and authorised method remain incomplete.</desc>
  <rect width="900" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="190" cy="150" r="44"/>
    <path d="M190 194 L190 325 M190 230 L120 280 M190 230 L270 270 M190 325 L140 430 M190 325 L250 430"/>
    <rect x="260" y="205" width="190" height="135" rx="12"/>
    <rect x="285" y="230" width="140" height="45" rx="5"/>
    <path d="M295 305 H320 M345 305 H370 M395 305 H420"/>
    <rect x="520" y="90" width="270" height="90" rx="10"/>
    <rect x="520" y="215" width="270" height="90" rx="10"/>
    <rect x="520" y="340" width="270" height="90" rx="10"/>
    <path d="M485 250 H515 M485 275 H515"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="355" y="262" font-size="30">0.60%</text>
    <text x="655" y="125" font-size="27">CURRENT EVIDENCE</text>
    <text x="655" y="160" font-size="25">?</text>
    <text x="655" y="250" font-size="27">LENGTH BASIS</text>
    <text x="655" y="285" font-size="25">?</text>
    <text x="655" y="375" font-size="27">AUTHORISED METHOD</text>
    <text x="655" y="410" font-size="25">?</text>
    <text x="450" y="485" font-size="28">Decimal precision cannot replace missing evidence.</text>
  </g>
</svg>