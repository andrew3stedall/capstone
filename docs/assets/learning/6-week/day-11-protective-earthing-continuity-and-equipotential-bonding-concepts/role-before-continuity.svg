<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Identify the protective role before claiming continuity</title>
  <desc id="desc">Black-and-white stick-figure cartoon. A learner points to two labelled paths: protective earthing to an equipment enclosure and bonding between two conductive parts. A checklist separates identity, connection, continuity, condition and suitability.</desc>
  <rect width="900" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="100" r="28"/>
    <line x1="120" y1="128" x2="120" y2="235"/>
    <line x1="120" y1="160" x2="65" y2="205"/>
    <line x1="120" y1="160" x2="205" y2="145"/>
    <line x1="120" y1="235" x2="80" y2="310"/>
    <line x1="120" y1="235" x2="165" y2="310"/>
    <rect x="260" y="70" width="150" height="115" rx="8"/>
    <line x1="335" y1="185" x2="335" y2="250"/>
    <line x1="300" y1="250" x2="370" y2="250"/>
    <path d="M260 130 H215 V310 H445"/>
    <circle cx="520" cy="130" r="42"/>
    <circle cx="650" cy="130" r="42"/>
    <line x1="562" y1="130" x2="608" y2="130"/>
    <rect x="500" y="260" width="330" height="115" rx="8"/>
    <line x1="525" y1="290" x2="545" y2="310"/>
    <line x1="545" y1="310" x2="575" y2="275"/>
    <line x1="525" y1="330" x2="545" y2="350"/>
    <line x1="545" y1="350" x2="575" y2="315"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black">
    <text x="40" y="360" font-size="22">Name the part and purpose first</text>
    <text x="270" y="105" font-size="20">Equipment</text>
    <text x="278" y="135" font-size="20">enclosure</text>
    <text x="210" y="335" font-size="18">protective earthing path</text>
    <text x="476" y="75" font-size="18">conductive part A</text>
    <text x="606" y="75" font-size="18">conductive part B</text>
    <text x="540" y="195" font-size="18">bonding connection</text>
    <text x="595" y="287" font-size="19">Identity</text>
    <text x="595" y="327" font-size="19">Connection</text>
    <text x="690" y="287" font-size="19">Continuity?</text>
    <text x="690" y="327" font-size="19">Suitability?</text>
    <text x="520" y="402" font-size="18">Visible connection ≠ verified protective performance</text>
  </g>
</svg>