<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-labelledby="title desc"><title id="title">Retrieve, repair and defer scenario errors</title><desc id="desc">A black-line stick figure sorts cards into retrieve, repair and defer boxes while a clock marks a thirty-minute limit.</desc><rect width="800" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="130" cy="90" r="30"/><path d="M130 120v100m0-65-55 45m55-45 65 35m-65 30-45 85m45-85 50 85"/><rect x="270" y="225" width="130" height="90"/><rect x="445" y="225" width="130" height="90"/><rect x="620" y="225" width="130" height="90"/><path d="M205 150h75v50h-75zM300 125h75v50h-75zM485 120h75v50h-75z"/><circle cx="680" cy="85" r="48"/><path d="M680 85V52m0 33 26 16"/></g><g font-family="sans-serif" font-size="24" fill="black" text-anchor="middle"><text x="335" y="280">RETRIEVE</text><text x="510" y="280">REPAIR</text><text x="685" y="280">DEFER</text><text x="680" y="155">30 MIN MAX</text><text x="400" y="385">Sort by consequence; stop before fatigue replaces evidence.</text></g></svg>