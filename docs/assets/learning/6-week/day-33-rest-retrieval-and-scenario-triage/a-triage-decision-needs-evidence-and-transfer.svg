<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">A triage decision needs evidence and transfer</title>
  <desc id="desc">A black-and-white stick figure moves a fictional scenario card through four linked boxes labelled evidence, consequence, bounded repair and changed condition, ending at a readiness decision and stop clock.</desc>
  <rect width="960" height="500" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="70" cy="235" r="25"/>
    <path d="M70 260v95M70 282l-34 34M70 282l46 10M70 355l-28 60M70 355l38 60"/>
    <rect x="130" y="120" width="155" height="160" rx="12"/><rect x="320" y="120" width="155" height="160" rx="12"/><rect x="510" y="120" width="155" height="160" rx="12"/><rect x="700" y="120" width="155" height="160" rx="12"/>
    <path d="M285 200h35M475 200h35M665 200h35"/><path d="M303 188l17 12-17 12M493 188l17 12-17 12M683 188l17 12-17 12"/>
    <rect x="700" y="345" width="180" height="75" rx="10"/><path d="M777 280v65M765 328l12 17 12-17"/>
    <circle cx="560" cy="382" r="45"/><path d="M560 382v-25M560 382l22 13"/><path d="M515 382h-45" stroke-dasharray="14 10"/><path d="M480 370l-15 12 15 12"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="480" y="48" font-size="29" font-weight="700">TRIAGE NEEDS EVIDENCE, CONSEQUENCE AND TRANSFER</text>
    <text x="207" y="165" font-size="20" font-weight="700">EVIDENCE</text><text x="207" y="200" font-size="16">recalled, supported</text><text x="207" y="225" font-size="16">or unresolved?</text>
    <text x="397" y="165" font-size="20" font-weight="700">CONSEQUENCE</text><text x="397" y="200" font-size="16">safety, prerequisite</text><text x="397" y="225" font-size="16">or presentation?</text>
    <text x="587" y="165" font-size="20" font-weight="700">BOUNDED</text><text x="587" y="193" font-size="20" font-weight="700">REPAIR</text><text x="587" y="225" font-size="16">smallest source needed</text>
    <text x="777" y="165" font-size="20" font-weight="700">CHANGED</text><text x="777" y="193" font-size="20" font-weight="700">CONDITION</text><text x="777" y="225" font-size="16">does it transfer?</text>
    <text x="790" y="375" font-size="18" font-weight="700">READINESS</text><text x="790" y="400" font-size="18" font-weight="700">DECISION</text>
    <text x="560" y="450" font-size="18" font-weight="700">STOP BY 30 MINUTES</text><text x="480" y="485" font-size="19">Repair no more than three high-value gaps; defer unresolved technical claims.</text>
  </g>
</svg>
