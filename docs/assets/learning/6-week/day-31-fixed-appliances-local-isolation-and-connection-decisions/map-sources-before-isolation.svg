<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc"><title id="title">Map sources before isolation</title><desc id="desc">A black-and-white stick figure maps supply, remote control and stored energy paths into a fixed appliance before a dashed isolation boundary and evidence gate.</desc><rect width="900" height="460" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="75" cy="105" r="27"/><path d="M75 132v115M75 165l-42 42M75 165l58 35M75 247l-36 77M75 247l42 77"/><rect x="190" y="70" width="150" height="62" rx="8"/><rect x="190" y="165" width="150" height="62" rx="8"/><rect x="190" y="260" width="150" height="62" rx="8"/><rect x="430" y="120" width="180" height="160" rx="12"/><path d="M340 101l90 70M340 196h90M340 291l90-62"/><path d="M650 65v310" stroke-dasharray="12 12"/><rect x="720" y="155" width="125" height="110" rx="10"/><path d="M610 200h110"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="265" y="108" font-size="18">SUPPLY</text><text x="265" y="203" font-size="18">REMOTE CONTROL</text><text x="265" y="298" font-size="18">STORED ENERGY</text><text x="520" y="185" font-size="21" font-weight="700">FIXED</text><text x="520" y="220" font-size="21" font-weight="700">APPLIANCE</text><text x="650" y="405" font-size="18">ISOLATION BOUNDARY?</text><text x="782" y="202" font-size="18">VERIFY ALL</text><text x="782" y="230" font-size="18">SOURCES</text><text x="450" y="435" font-size="24" font-weight="700">A CONTROL IS NOT PROVEN ISOLATION</text></g></svg>