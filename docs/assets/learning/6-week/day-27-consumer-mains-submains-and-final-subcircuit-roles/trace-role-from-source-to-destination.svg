<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc"><title id="title">Trace circuit role from source to destination</title><desc id="desc">A black-and-white stick figure traces a line from supply boundary to main switchboard, downstream board and two loads, with labels for consumer mains candidate, submain candidate and final-subcircuit candidates.</desc><rect width="900" height="460" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="75" cy="100" r="27"/><path d="M75 127v115M75 162l-42 43M75 162l58 32M75 242l-37 78M75 242l42 78"/><rect x="175" y="85" width="120" height="90" rx="10"/><rect x="390" y="85" width="145" height="90" rx="10"/><rect x="630" y="85" width="140" height="90" rx="10"/><circle cx="665" cy="290" r="36"/><rect x="725" y="255" width="75" height="70" rx="8"/><path d="M295 130h95M535 130h95M700 175v80M700 290h25"/><path d="M350 115l18 15-18 15M590 115l18 15-18 15"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="235" y="122" font-size="18">SUPPLY</text><text x="235" y="147" font-size="18">BOUNDARY</text><text x="462" y="137" font-size="18">MAIN BOARD</text><text x="700" y="137" font-size="18">DOWNSTREAM BOARD</text><text x="665" y="350" font-size="17">LIGHTING</text><text x="762" y="350" font-size="17">EQUIPMENT</text><text x="342" y="210" font-size="17">CONSUMER MAINS?</text><text x="580" y="210" font-size="17">SUBMAIN?</text><text x="730" y="395" font-size="17">FINAL SUBCIRCUITS?</text><text x="450" y="435" font-size="25" font-weight="700">SOURCE + DESTINATION + FUNCTION DEFINE THE CANDIDATE ROLE</text></g></svg>