    <path d="M880 335l15 15 28-35"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="480" y="48" font-size="30" font-weight="700">A ROLE NEEDS FOUR EVIDENCE LINKS</text>
    <text x="230" y="315" font-size="20" font-weight="700">BOUNDARY</text>
    <text x="410" y="315" font-size="20" font-weight="700">SOURCE</text>
    <text x="590" y="315" font-size="20" font-weight="700">DESTINATION</text>
    <text x="770" y="315" font-size="20" font-weight="700">FUNCTION</text>
    <text x="480" y="430" font-size="21">If one link is missing or conflicts, record the classification as unresolved.</text>
  </g>
</svg>
