<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440" role="img" aria-labelledby="title desc"><title id="title">Trace dependencies before interpreting results</title><desc id="desc">A black-line stick figure follows result cards through provenance, validity and criterion gates into a bounded evidence ledger.</desc><rect width="860" height="440" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="90" cy="90" r="28"/><path d="M90 118v100m0-60-45 40m45-40 55 30m-55 30-38 80m38-80 43 80"/><rect x="185" y="145" width="120" height="110" rx="10"/><path d="M305 200h75"/><path d="m365 185 20 15-20 15"/><rect x="385" y="90" width="85" height="220"/><path d="M470 200h75"/><path d="m530 185 20 15-20 15"/><rect x="550" y="90" width="85" height="220"/><path d="M635 200h65"/><path d="m685 185 20 15-20 15"/><rect x="705" y="135" width="125" height="130" rx="10"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="245" y="195" font-size="21">RESULT +</text><text x="245" y="222" font-size="21">PROVENANCE</text><text x="427" y="335" font-size="20">VALIDITY</text><text x="592" y="335" font-size="20">CRITERION</text><text x="767" y="190" font-size="21">BOUNDED</text><text x="767" y="218" font-size="21">LEDGER</text><text x="430" y="420" font-size="23">A plausible value is not evidence until dependencies remain valid.</text></g></svg>