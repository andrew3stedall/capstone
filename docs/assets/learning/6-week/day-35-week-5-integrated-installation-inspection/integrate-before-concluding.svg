<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" role="img" aria-labelledby="title desc"><title id="title">Integrate evidence before concluding</title><desc id="desc">A stick figure combines cards labelled location, appliance, motor, sources and evidence into one inspection report.</desc><rect width="820" height="430" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="110" cy="85" r="28"/><path d="M110 113v92m0-55-52 35m52-35 58 30m-58 25-42 82m42-82 47 82"/><rect x="245" y="35" width="130" height="62"/><rect x="245" y="115" width="130" height="62"/><rect x="245" y="195" width="130" height="62"/><rect x="245" y="275" width="130" height="62"/><rect x="245" y="355" width="130" height="52"/><path d="M375 66h100m-100 80h100m-100 80h100m-100 80h100m-100 75h100"/><rect x="475" y="105" width="270" height="230"/><path d="M510 155h200m-200 45h200m-200 45h200m-200 45h145"/></g><g font-family="sans-serif" font-size="21" fill="black" text-anchor="middle"><text x="310" y="75">LOCATION</text><text x="310" y="155">APPLIANCE</text><text x="310" y="235">MOTOR</text><text x="310" y="315">SOURCES</text><text x="310" y="390">EVIDENCE</text><text x="610" y="80">BOUNDED INSPECTION REPORT</text><text x="410" y="425">Combine evidence; do not upgrade gaps into conclusions.</text></g></svg>