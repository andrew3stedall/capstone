<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Sort loads before calculating</title>
  <desc id="desc">A stick-figure learner sorts load cards into labelled groups for source, phase and operating mode before using a calculator.</desc>
  <rect width="900" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="125" cy="120" r="35"/>
    <path d="M125 155v120M125 185l-65 55M125 185l70 15M125 275l-45 90M125 275l55 90"/>
    <rect x="250" y="90" width="150" height="80" rx="8"/>
    <rect x="250" y="205" width="150" height="80" rx="8"/>
    <rect x="250" y="320" width="150" height="80" rx="8"/>
    <path d="M205 200l35-30M205 200l35 45M205 200l35 145"/>
    <rect x="540" y="150" width="180" height="210" rx="10"/>
    <path d="M580 205h100M580 250h100M580 295h100"/>
    <path d="M430 245h80"/>
    <path d="M490 225l20 20-20 20"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="24" fill="black" text-anchor="middle">
    <text x="325" y="135">SOURCE</text>
    <text x="325" y="250">PHASE</text>
    <text x="325" y="365">OPERATING MODE</text>
    <text x="630" y="120">CALCULATE LAST</text>
    <text x="450" y="465">Sort the evidence before the arithmetic.</text>
  </g>
</svg>