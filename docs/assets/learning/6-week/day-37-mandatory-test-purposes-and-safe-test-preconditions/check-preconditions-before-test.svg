<svg xmlns="http://www.w3.org/2000/svg" width="840" height="440" viewBox="0 0 840 440" role="img" aria-labelledby="title desc"><title id="title">Check preconditions before a test</title><desc id="desc">A black-line stick figure checks four cards labelled purpose, sources, authority and method before a closed test gate.</desc><rect width="840" height="440" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="100" cy="85" r="28"/><path d="M100 113v100m0-60-50 40m50-40 58 30m-58 30-42 82m42-82 47 82"/><rect x="220" y="45" width="155" height="65"/><rect x="220" y="130" width="155" height="65"/><rect x="220" y="215" width="155" height="65"/><rect x="220" y="300" width="155" height="65"/><path d="M375 78h155m-155 85h155m-155 85h155m-155 85h155" stroke-dasharray="10 10"/><rect x="530" y="80" width="55" height="280"/><path d="M585 220h95"/><path d="M665 205l20 15-20 15"/><rect x="690" y="155" width="110" height="130" rx="10"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="297" y="85" font-size="22">PURPOSE</text><text x="297" y="170" font-size="22">SOURCES</text><text x="297" y="255" font-size="22">AUTHORITY</text><text x="297" y="340" font-size="22">METHOD</text><text x="557" y="385" font-size="20">GATE</text><text x="745" y="225" font-size="22">TEST</text><text x="420" y="420" font-size="23">Missing one precondition means stop, not improvise.</text></g></svg>