    <text x="280" y="355" font-size="20" font-weight="700">RECALLED MODEL</text>
    <text x="565" y="355" font-size="20" font-weight="700">SUPPORTED REPAIR</text>
    <text x="825" y="355" font-size="20" font-weight="700">CHANGED PROMPT</text>
    <text x="480" y="435" font-size="21">A neater redraw is not proof until the relationship is checked and transferred.</text>
