<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc"><title id="title">Redraw, correct and stop</title><desc id="desc">A black-and-white stick figure redraws two small diagrams, marks one correction in an error log and stops at a thirty-minute timer.</desc><rect width="900" height="460" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="90" cy="105" r="28"/><path d="M90 133v120M90 170l-45 45M90 170l60 35M90 253l-38 82M90 253l44 82"/><rect x="220" y="70" width="180" height="120"/><rect x="440" y="70" width="180" height="120"/><rect x="270" y="245" width="250" height="95"/><circle cx="700" cy="210" r="70"/><path d="M700 210v-38M700 210l34 20"/><path d="M300 285h150M300 315h110"/><path d="M620 210h10" stroke-dasharray="8 8"/></g><g font-family="Arial, sans-serif" fill="black" text-anchor="middle"><text x="310" y="140" font-size="18">SWITCHBOARD MAP</text><text x="530" y="140" font-size="18">ROUTE SEGMENTS</text><text x="395" y="285" font-size="18">ONE HIGH-VALUE</text><text x="395" y="312" font-size="18">ERROR CORRECTION</text><text x="700" y="305" font-size="22">30 MIN MAX</text><text x="450" y="420" font-size="25" font-weight="700">RETRIEVE, REPAIR, THEN STOP</text></g></svg>