<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Triage before the mock</title><desc id="desc">A black-and-white stick figure sorts study cards into retrieve, repair and defer trays while a clock limits the session.</desc><rect width="960" height="540" fill="white"/><g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><circle cx="120" cy="125" r="32"/><path d="M120 157v125M120 190l-62 52M120 190l74 34M120 282l-46 88M120 282l50 88"/><rect x="250" y="160" width="170" height="170" rx="12"/><rect x="445" y="160" width="170" height="170" rx="12"/><rect x="640" y="160" width="170" height="170" rx="12"/><rect x="205" y="80" width="110" height="60" rx="8"/><path d="M194 224l70-55"/><circle cx="850" cy="105" r="55"/><path d="M850 105V70M850 105l28 18"/></g><g font-family="Arial,Helvetica,sans-serif" fill="black" text-anchor="middle"><text x="480" y="55" font-size="32" font-weight="700">TRIAGE BEFORE THE MOCK</text><text x="335" y="250" font-size="24">RETRIEVE</text><text x="530" y="250" font-size="24">REPAIR</text><text x="725" y="250" font-size="24">DEFER</text><text x="850" y="190" font-size="20">30 MIN MAX</text><text x="480" y="455" font-size="26">Repair the earliest important error, not every unfinished page.</text></g></svg>