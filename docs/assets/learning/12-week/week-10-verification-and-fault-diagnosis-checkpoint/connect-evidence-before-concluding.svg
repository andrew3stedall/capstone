<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Connect evidence before concluding</title>
  <desc id="desc">A stick-figure learner links separate observation, result, dependency and hypothesis cards to a small bounded-conclusion card. A stop sign beside a toolbox shows that practical work is outside the exercise.</desc>
  <rect width="900" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="170" cy="150" r="38"/>
    <path d="M170 188v115M170 220l-70 55M170 220l78 35M170 303l-58 92M170 303l65 92"/>
    <rect x="320" y="70" width="150" height="78" rx="8"/>
    <rect x="320" y="180" width="150" height="78" rx="8"/>
    <rect x="320" y="290" width="150" height="78" rx="8"/>
    <rect x="560" y="180" width="190" height="100" rx="8"/>
    <path d="M470 109h55l35 95M470 219h90M470 329h55l35-95"/>
    <rect x="675" y="350" width="120" height="70" rx="8"/>
    <path d="M735 350v-55"/>
    <circle cx="735" cy="265" r="30"/>
    <path d="M715 245l40 40M755 245l-40 40"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="24" fill="black" text-anchor="middle">
    <text x="395" y="118">OBSERVATION</text>
    <text x="395" y="228">RESULT</text>
    <text x="395" y="338">DEPENDENCY</text>
    <text x="655" y="220">BOUNDED</text>
    <text x="655" y="252">CONCLUSION</text>
    <text x="735" y="395">NO FIELD</text>
    <text x="735" y="417">WORK</text>
  </g>
  <text x="450" y="480" font-family="Arial, sans-serif" font-size="28" fill="black" text-anchor="middle">Connect evidence before concluding.</text>
</svg>