<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Compare the condition, not just the location name</title>
  <desc id="desc">A stick-figure learner compares three special-location cards using condition, users, supply and controls before drawing a bounded conclusion.</desc>
  <rect width="960" height="440" fill="#fff"/>
  <g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="105" cy="205" r="28"/><path d="M105 233V320 M105 265L185 235 M105 270L58 302 M105 320L72 390 M105 320L145 390"/>
    <rect x="250" y="90" width="180" height="230" rx="8"/>
    <rect x="470" y="90" width="180" height="230" rx="8"/>
    <rect x="690" y="90" width="180" height="230" rx="8"/>
    <path d="M280 145H400 M280 190H400 M280 235H380"/>
    <path d="M500 145H620 M500 190H620 M500 235H600"/>
    <path d="M720 145H840 M720 190H840 M720 235H820"/>
    <path d="M430 205H470 M650 205H690"/>
  </g>
  <g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="340" y="70" font-size="20" font-weight="700">CONDITION</text>
    <text x="560" y="70" font-size="20" font-weight="700">USERS + SUPPLY</text>
    <text x="780" y="70" font-size="20" font-weight="700">CONTROLS</text>
    <text x="340" y="290" font-size="18" font-weight="700">WHAT CHANGED?</text>
    <text x="560" y="290" font-size="18" font-weight="700">WHO + HOW?</text>
    <text x="780" y="290" font-size="18" font-weight="700">VERIFY, DON'T COPY</text>
    <text x="480" y="420" font-size="27" font-weight="700">Similar names do not prove similar rules.</text>
  </g>
</svg>