<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc"><title id="title">Triage three then rest</title><desc id="desc">A stick-figure learner sorts error cards into repair now, schedule later and rest, with only three cards in the repair box.</desc><rect width="760" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="80" cy="90" r="25"/><path d="M80 115v80M80 140l-38 30M80 140l42 20M80 195l-28 58M80 195l34 58"/><rect x="160" y="45" width="145" height="95"/><rect x="335" y="45" width="145" height="95"/><rect x="510" y="45" width="145" height="95"/><rect x="185" y="75" width="24" height="24"/><rect x="220" y="75" width="24" height="24"/><rect x="255" y="75" width="24" height="24"/><path d="M232 150v55M407 150v55M582 150v55"/><rect x="170" y="215" width="125" height="55"/><rect x="345" y="215" width="125" height="55"/><rect x="520" y="215" width="125" height="55"/></g><g font-family="Arial, sans-serif" font-size="16" fill="black" text-anchor="middle"><text x="232" y="65">Repair now</text><text x="407" y="90">Schedule later</text><text x="582" y="90">Rest</text><text x="232" y="249">Max three</text><text x="407" y="249">Lower priority</text><text x="582" y="249">Stop on time</text><text x="380" y="320" font-size="22">Repair the blockers, then protect recovery.</text></g></svg>