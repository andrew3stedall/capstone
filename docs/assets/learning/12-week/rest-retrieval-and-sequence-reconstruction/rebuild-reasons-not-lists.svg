<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Rebuild reasons, not lists</title>
  <desc id="desc">A stick-figure learner arranges shuffled evidence cards into a dependency chain beside a timer and a closed notebook.</desc>
  <rect width="960" height="440" fill="#fff"/>
  <g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="175" r="28"/>
    <path d="M120 203V305 M120 235L215 215 M120 245L62 285 M120 305L82 385 M120 305L160 385"/>
    <rect x="255" y="95" width="120" height="65" rx="6"/>
    <rect x="420" y="95" width="120" height="65" rx="6"/>
    <rect x="585" y="95" width="120" height="65" rx="6"/>
    <rect x="340" y="225" width="120" height="65" rx="6" transform="rotate(-6 400 258)"/>
    <rect x="535" y="235" width="120" height="65" rx="6" transform="rotate(7 595 268)"/>
    <path d="M375 128H410 M540 128H575"/>
    <path d="M397 113L410 128L397 143 M562 113L575 128L562 143"/>
    <circle cx="800" cy="135" r="58"/>
    <path d="M800 135L800 95 M800 135L830 152"/>
    <rect x="730" y="245" width="140" height="95" rx="8"/>
    <path d="M750 270H850 M750 295H850"/>
  </g>
  <g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="315" y="134" font-size="17" font-weight="700">QUESTION</text>
    <text x="480" y="134" font-size="17" font-weight="700">EVIDENCE</text>
    <text x="645" y="134" font-size="17" font-weight="700">LIMITS</text>
    <text x="800" y="385" font-size="18" font-weight="700">STOP ON TIME</text>
    <text x="480" y="420" font-size="27" font-weight="700">Rebuild the reasons. Then stop.</text>
  </g>
</svg>