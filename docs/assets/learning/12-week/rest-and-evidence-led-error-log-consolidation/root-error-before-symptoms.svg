    <circle cx="110" cy="105" r="28"/>
    <path d="M110 133v92M110 160l-42 45M110 160l55 10M110 225l-35 70M110 225l42 70"/>
    <rect x="200" y="70" width="145" height="86" rx="8"/>
    <rect x="405" y="45" width="145" height="72" rx="8"/>
    <rect x="405" y="150" width="145" height="72" rx="8"/>
    <rect x="405" y="255" width="145" height="72" rx="8"/>
    <path d="M345 113h60M345 113l28-18M345 113l28 18"/>
    <path d="M345 113c35 0 28 73 60 73M345 113c35 0 28 178 60 178"/>
    <path d="M435 70l85 25M520 70l-85 25M435 175l85 25M520 175l-85 25M435 280l85 25M520 280l-85 25"/>
    <circle cx="685" cy="108" r="58"/>
