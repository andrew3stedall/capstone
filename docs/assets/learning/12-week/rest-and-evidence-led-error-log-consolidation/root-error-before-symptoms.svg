    <path d="M625 330h125"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="272" y="105" font-size="22" font-weight="bold">ROOT ERROR</text>
    <text x="272" y="133" font-size="17">first unsupported step</text>
    <text x="477" y="87" font-size="18">symptom answer</text>
    <text x="477" y="192" font-size="18">symptom answer</text>
    <text x="477" y="297" font-size="18">symptom answer</text>
    <text x="685" y="190" font-size="18">stop limit</text>
    <text x="687" y="359" font-size="20" font-weight="bold">Repair upstream, then reopen dependencies</text>
  </g>
</svg>