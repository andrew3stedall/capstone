<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Match the route to the risk</title><desc id="desc">A stick-figure learner compares a cable route with impact, heat and moisture hazards before selecting a protected wiring-system concept.</desc><rect width="960" height="420" fill="#fff"/><g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="105" cy="205" r="25"/><path d="M105 230V310M105 250L175 210M105 260L55 285M105 310L70 375M105 310L145 375"/><path d="M220 210H730"/><path d="M310 180V240M430 165V255M550 180V240"/><rect x="255" y="80" width="110" height="60" rx="8"/><rect x="375" y="65" width="110" height="60" rx="8"/><rect x="495" y="80" width="110" height="60" rx="8"/><path d="M730 210H820"/><rect x="820" y="160" width="120" height="100" rx="8"/></g><g fill="#000" font-family="Arial,Helvetica,sans-serif" text-anchor="middle"><text x="310" y="117" font-size="19" font-weight="700">IMPACT</text><text x="430" y="102" font-size="19" font-weight="700">HEAT</text><text x="550" y="117" font-size="19" font-weight="700">MOISTURE</text><text x="880" y="205" font-size="18" font-weight="700">SELECT</text><text x="880" y="230" font-size="18" font-weight="700">+ PROTECT</text><text x="480" y="402" font-size="27" font-weight="700">The route creates the question before the cable answers it.</text></g></svg>