<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Map every source before trusting one switch</title>
  <desc id="desc">A stick-figure learner studies a board while separate arrows from network, generator, solar and battery sources point toward it. One open switch is shown as only one part of the source map.</desc>
  <rect width="960" height="440" fill="#fff"/>
  <g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="110" cy="225" r="28"/>
    <path d="M110 253V335 M110 280L190 245 M110 286L55 315 M110 335L75 395 M110 335L148 395"/>
    <rect x="350" y="115" width="230" height="220" rx="10"/>
    <path d="M350 165H580 M410 115V335 M520 115V335"/>
    <rect x="430" y="190" width="75" height="65" rx="5"/>
    <path d="M445 222H490"/>
    <rect x="690" y="35" width="190" height="55" rx="6"/>
    <rect x="690" y="125" width="190" height="55" rx="6"/>
    <rect x="690" y="215" width="190" height="55" rx="6"/>
    <rect x="690" y="305" width="190" height="55" rx="6"/>
    <path d="M690 63L580 145 M690 153L580 190 M690 243L580 245 M690 333L580 300"/>
    <path d="M190 245L330 225"/>
    <circle cx="260" cy="225" r="24"/>
    <path d="M277 242L310 275"/>
  </g>
  <g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="785" y="70" font-size="20" font-weight="700">NETWORK</text>
    <text x="785" y="160" font-size="20" font-weight="700">GENERATOR</text>
    <text x="785" y="250" font-size="20" font-weight="700">SOLAR</text>
    <text x="785" y="340" font-size="20" font-weight="700">BATTERY</text>
    <text x="465" y="365" font-size="20" font-weight="700">ONE OPEN SWITCH</text>
    <text x="480" y="420" font-size="27" font-weight="700">One switch is a clue. Every source is the question.</text>
  </g>
</svg>