<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Confidence is not evidence</title>
  <desc id="desc">Two black-and-white stick figures compare a large confidence speech bubble with a smaller verified evidence folder; an arrow shows that checking sources, not certainty, strengthens a conclusion.</desc>
  <rect width="900" height="520" fill="white"/>
  <text x="120" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="700">Confidence is not evidence.</text>
  <circle cx="215" cy="230" r="30" fill="white" stroke="black" stroke-width="6"/>
  <path d="M215 260 L215 365 M215 295 L155 330 M215 295 L275 330 M215 365 L170 440 M215 365 L260 440" fill="none" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <path d="M90 95 H360 Q390 95 390 125 V190 Q390 220 360 220 H260 L215 255 L225 220 H90 Q60 220 60 190 V125 Q60 95 90 95Z" fill="white" stroke="black" stroke-width="5"/>
  <text x="105" y="145" font-family="Arial, sans-serif" font-size="27" font-weight="700">“I’m certain!”</text>
  <circle cx="675" cy="230" r="30" fill="white" stroke="black" stroke-width="6"/>
  <path d="M675 260 L675 365 M675 295 L615 330 M675 295 L735 330 M675 365 L630 440 M675 365 L720 440" fill="none" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <rect x="575" y="105" width="220" height="115" rx="8" fill="white" stroke="black" stroke-width="5"/>
  <path d="M595 135 H765 M595 165 H735 M595 195 H750" stroke="black" stroke-width="4"/>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="23" font-weight="700">Verified source trail</text>
  <path d="M410 285 H530" stroke="black" stroke-width="8"/>
  <path d="M515 265 L545 285 L515 305" fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="390" y="345" font-family="Arial, sans-serif" font-size="24">Check currency</text>
  <text x="390" y="375" font-family="Arial, sans-serif" font-size="24">Check scope</text>
  <text x="390" y="405" font-family="Arial, sans-serif" font-size="24">Check applicability</text>
  <text x="160" y="485" font-family="Arial, sans-serif" font-size="25">Certainty may start the search. Verification finishes it.</text>
</svg>