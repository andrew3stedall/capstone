<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Map before march</title>
  <desc id="desc">A black-and-white stick figure pauses at the start of a twelve-week path to check a source map, while signposts point to RTO instructions, standards, regulator guidance and workplace procedures.</desc>
  <rect width="900" height="520" fill="white"/>
  <path d="M80 440 C250 360 390 465 560 360 S760 245 835 100" fill="none" stroke="black" stroke-width="7" stroke-dasharray="18 14"/>
  <circle cx="185" cy="260" r="30" fill="white" stroke="black" stroke-width="6"/>
  <path d="M185 290 L185 385 M185 315 L130 350 M185 315 L240 345 M185 385 L140 445 M185 385 L230 445" fill="none" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <rect x="245" y="270" width="155" height="105" fill="white" stroke="black" stroke-width="5"/>
  <path d="M260 300 L380 300 M260 325 L350 325 M260 350 L370 350" stroke="black" stroke-width="4"/>
  <path d="M225 340 L265 325" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <path d="M500 110 L500 340" stroke="black" stroke-width="8"/>
  <path d="M500 135 L650 135 L620 105 M500 190 L660 190 L630 160 M500 245 L665 245 L635 215 M500 300 L680 300 L650 270" fill="white" stroke="black" stroke-width="5"/>
  <text x="520" y="128" font-family="Arial, sans-serif" font-size="22">RTO instructions</text>
  <text x="520" y="183" font-family="Arial, sans-serif" font-size="22">Standards</text>
  <text x="520" y="238" font-family="Arial, sans-serif" font-size="22">Regulator</text>
  <text x="520" y="293" font-family="Arial, sans-serif" font-size="22">Work procedure</text>
  <text x="90" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700">Map the evidence before starting the route.</text>
  <text x="100" y="490" font-family="Arial, sans-serif" font-size="24">A confident shortcut is still a shortcut.</text>
</svg>