<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Record each gate before cable selection</title><desc id="desc">A stick figure records load, protection, route, voltage and fault evidence on a checklist before pointing to a provisional cable candidate.</desc><rect width="960" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="125" cy="105" r="35"/><path d="M125 140v110m0-70-55 45m55-45 60 35m-60 35-45 90m45-90 55 90"/><rect x="275" y="55" width="420" height="290"/><path d="M310 105h35m25 0h270M310 155h35m25 0h270M310 205h35m25 0h270M310 255h35m25 0h270M310 305h35m25 0h270M315 95l10 10 18-22M315 145l10 10 18-22M315 195l10 10 18-22"/><path d="M745 210h120m-25-25 25 25-25 25"/><rect x="760" y="255" width="155" height="65" rx="8"/></g><g font-family="Arial, sans-serif" fill="black"><text x="285" y="38" font-size="24" font-weight="bold">Evidence gates</text><text x="375" y="112" font-size="20">Load and boundary</text><text x="375" y="162" font-size="20">Protection role</text><text x="375" y="212" font-size="20">Route conditions</text><text x="375" y="262" font-size="20">Voltage and fault checks</text><text x="375" y="312" font-size="20">Unresolved dependencies</text><text x="770" y="292" font-size="18">Provisional</text><text x="774" y="314" font-size="18">candidate</text><text x="260" y="395" font-size="22" font-weight="bold">Caption: Record every applicable gate; do not turn missing evidence into approval.</text></g></svg>