<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Observe, classify and escalate</title><desc id="desc">A stick-figure learner studies a switchboard photograph, records an observation, checks evidence and chooses either a bounded conclusion or escalation.</desc><rect width="960" height="420" fill="#fff"/><g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="110" cy="190" r="25"/><path d="M110 215V300M110 240L180 205M110 250L60 275M110 300L75 365M110 300L150 365"/><rect x="230" y="75" width="240" height="250" rx="10"/><path d="M270 120H430M270 165H430M270 210H430M270 255H430"/><path d="M470 150H585M470 250H585"/><rect x="585" y="115" width="145" height="70" rx="8"/><rect x="585" y="215" width="145" height="70" rx="8"/><path d="M730 150H850M730 250H850"/><rect x="850" y="115" width="90" height="70" rx="8"/><rect x="850" y="215" width="90" height="70" rx="8"/></g><g fill="#000" font-family="Arial,Helvetica,sans-serif" text-anchor="middle"><text x="350" y="55" font-size="24" font-weight="700">OBSERVE</text><text x="657" y="145" font-size="20" font-weight="700">EVIDENCE</text><text x="657" y="170" font-size="18">COMPLETE?</text><text x="895" y="158" font-size="18" font-weight="700">BOUND</text><text x="657" y="245" font-size="20" font-weight="700">MISSING?</text><text x="895" y="258" font-size="18" font-weight="700">ESCALATE</text><text x="480" y="400" font-size="27" font-weight="700">A visible feature is not yet a verified defect.</text></g></svg>