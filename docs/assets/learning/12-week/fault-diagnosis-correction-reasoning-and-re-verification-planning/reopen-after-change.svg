<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc"><title id="title">Reopen evidence after each material change</title><desc id="desc">A stick figure reviews linked evidence cards after a first maintenance change and then reopens the affected cards again after a later control module replacement.</desc><rect width="760" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="75" cy="88" r="24"/><path d="M75 112v78M75 138l-34 26M75 138l36 22M75 190l-27 58M75 190l33 58"/><rect x="150" y="45" width="120" height="58"/><rect x="150" y="130" width="120" height="58"/><rect x="150" y="215" width="120" height="58"/><path d="M270 74h70M270 159h70M270 244h70"/><rect x="340" y="55" width="135" height="90"/><rect x="340" y="190" width="135" height="90"/><path d="M475 100h55M475 235h55"/><rect x="530" y="65" width="150" height="70"/><rect x="530" y="200" width="150" height="70"/><path d="M605 135v65"/><path d="M318 40l-12 12 12 12M306 52h22M318 175l-12 12 12 12M306 187h22"/></g><g font-family="Arial, sans-serif" font-size="15" fill="black" text-anchor="middle"><text x="210" y="79">Identity claim</text><text x="210" y="164">Result record</text><text x="210" y="249">Document state</text><text x="407" y="91">Change 1</text><text x="407" y="114">maintenance</text><text x="407" y="226">Change 2</text><text x="407" y="249">module replacement</text><text x="605" y="94">Reopen affected</text><text x="605" y="116">evidence</text><text x="605" y="229">Reopen again</text><text x="605" y="251">for both changes</text><text x="380" y="330" font-size="21">A later change does not inherit unverified evidence.</text></g></svg>