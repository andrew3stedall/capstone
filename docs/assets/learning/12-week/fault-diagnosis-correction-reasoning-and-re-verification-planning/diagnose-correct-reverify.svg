<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc"><title id="title">Diagnose, correct and re-verify</title><desc id="desc">A stick-figure learner connects separate cards for symptom, hypotheses, correction objective and re-verification instead of jumping straight to a fix.</desc><rect width="760" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="70" cy="90" r="25"/><path d="M70 115v80M70 140l-35 28M70 140l40 20M70 195l-28 58M70 195l34 58"/><rect x="145" y="70" width="120" height="65"/><rect x="320" y="35" width="120" height="65"/><rect x="320" y="130" width="120" height="65"/><rect x="495" y="70" width="120" height="65"/><rect x="495" y="190" width="120" height="65"/><path d="M265 102h55M440 68h55M440 162h55M555 135v55"/></g><g font-family="Arial, sans-serif" font-size="16" fill="black" text-anchor="middle"><text x="205" y="108">Symptom</text><text x="380" y="72">Hypothesis A</text><text x="380" y="167">Hypothesis B</text><text x="555" y="99">Correction</text><text x="555" y="120">objective</text><text x="555" y="219">Re-verification</text><text x="380" y="315" font-size="22">Do not jump from symptom straight to fix.</text></g></svg>