<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc"><title id="title">Control is not proof of isolation</title><desc id="desc">A stick-figure learner compares a wall control, main supply and separate control supply before deciding whether a fixed appliance is isolated.</desc><rect width="960" height="440" fill="#fff"/><g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="100" cy="205" r="27"/><path d="M100 232V320 M100 260L165 230 M100 270L55 300 M100 320L65 385 M100 320L140 385"/><rect x="230" y="165" width="105" height="95" rx="8"/><rect x="440" y="120" width="190" height="190" rx="10"/><circle cx="535" cy="215" r="45"/><path d="M335 215H440 M630 180H760 M630 250H760"/><rect x="760" y="145" width="130" height="55" rx="6"/><rect x="760" y="225" width="130" height="55" rx="6"/></g><g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="700"><text x="282" y="205" font-size="19">WALL</text><text x="282" y="230" font-size="19">CONTROL</text><text x="535" y="222" font-size="19">APPLIANCE</text><text x="825" y="180" font-size="18">MAIN SUPPLY</text><text x="825" y="260" font-size="18">CONTROL SUPPLY</text><text x="480" y="420" font-size="27">“Off” describes operation. Isolation needs evidence.</text></g></svg>