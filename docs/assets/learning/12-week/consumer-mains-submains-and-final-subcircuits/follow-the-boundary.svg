<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc"><title id="title">Follow the circuit boundary</title><desc id="desc">A stick-figure learner traces a supply through a main board, downstream board and final load, marking the boundaries rather than judging by conductor appearance.</desc><rect width="960" height="440" fill="#fff"/><g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="100" cy="205" r="27"/><path d="M100 232V320 M100 260L165 230 M100 270L55 300 M100 320L65 385 M100 320L140 385"/><rect x="220" y="145" width="130" height="140" rx="8"/><rect x="455" y="145" width="130" height="140" rx="8"/><circle cx="760" cy="215" r="55"/><path d="M350 215H455 M585 215H705 M170 230L220 215"/><path d="M285 115V315 M520 115V315"/></g><g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="700"><text x="285" y="205" font-size="20">MAIN</text><text x="285" y="230" font-size="20">BOARD</text><text x="520" y="205" font-size="20">DOWNSTREAM</text><text x="520" y="230" font-size="20">BOARD</text><text x="760" y="222" font-size="20">LOAD</text><text x="480" y="420" font-size="27">Name the function after tracing the boundary.</text></g></svg>