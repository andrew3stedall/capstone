<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Check every gate before concluding</title><desc id="desc">A stick figure reviews ten labelled checkpoint gates on a board before reaching a bounded conclusion box.</desc><rect width="960" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="105" cy="105" r="34"/><path d="M105 139v108m0-66-48 40m48-40 58 35m-58 31-43 88m43-88 52 88"/><rect x="235" y="45" width="470" height="305"/><path d="M270 90h28m25 0h330M270 140h28m25 0h330M270 190h28m25 0h330M270 240h28m25 0h330M270 290h28m25 0h330"/><path d="M275 80l10 10 18-22M275 130l10 10 18-22M275 180l10 10 18-22"/><path d="M725 200h115m-25-25 25 25-25 25"/><rect x="760" y="250" width="160" height="70" rx="8"/></g><g font-family="Arial, sans-serif" fill="black"><text x="350" y="32" font-size="24" font-weight="bold">Independent checkpoint gates</text><text x="330" y="98" font-size="19">Boundary and evidence</text><text x="330" y="148" font-size="19">Load and operating cases</text><text x="330" y="198" font-size="19">Device, conductor and route</text><text x="330" y="248" font-size="19">Remaining dependencies</text><text x="330" y="298" font-size="19">Change propagation and audit</text><text x="780" y="280" font-size="18">Bounded</text><text x="775" y="304" font-size="18">conclusion</text><text x="170" y="397" font-size="22" font-weight="bold">Caption: A high score cannot override a critical error or an unresolved safety dependency.</text></g></svg>