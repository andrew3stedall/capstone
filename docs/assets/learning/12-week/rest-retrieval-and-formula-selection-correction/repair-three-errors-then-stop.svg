<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc"><title id="title">Repair three errors, then stop</title><desc id="desc">A stick figure corrects three marked cards beside a clock and a stop sign, showing a bounded recovery session.</desc><rect width="900" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="110" cy="105" r="26"/><path d="M110 131v90m0-55-50 35m50-35 55 35m-55 20-40 70m40-70 45 70"/><rect x="245" y="90" width="120" height="90"/><rect x="395" y="90" width="120" height="90"/><rect x="545" y="90" width="120" height="90"/><path d="M275 130l20 20 40-45M425 130l20 20 40-45M575 130l20 20 40-45"/><circle cx="750" cy="130" r="55"/><path d="M750 130v-35m0 35 30 20"/><polygon points="750,235 820,355 680,355"/><path d="M750 270v40m0 18v2"/></g><g font-family="Arial, sans-serif" font-size="22" fill="black"><text x="260" y="220">1</text><text x="410" y="220">2</text><text x="560" y="220">3</text><text x="655" y="395">stop at the limit</text></g></svg>