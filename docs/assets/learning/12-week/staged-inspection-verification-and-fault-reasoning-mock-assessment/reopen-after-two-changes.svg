<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Reopen evidence after two material changes</title>
  <desc id="desc">Black-and-white stick-figure instructional diagram. A learner reviews an evidence chain. A control module change and then a source-state setting change point back to earlier records, showing that dependent conclusions must be reopened after each change.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="105" cy="135" r="34"/>
    <path d="M105 169 V300 M105 215 L55 270 M105 215 L175 245 M105 300 L70 405 M105 300 L145 405"/>
    <rect x="250" y="85" width="170" height="80"/>
    <rect x="500" y="85" width="170" height="80"/>
    <rect x="750" y="85" width="160" height="80"/>
    <path d="M420 125 H500 M670 125 H750"/>
    <path d="M475 105 L500 125 L475 145 M725 105 L750 125 L725 145"/>
    <rect x="285" y="325" width="220" height="95"/>
    <rect x="630" y="325" width="230" height="95"/>
    <path d="M395 325 C395 255 455 240 545 240 C635 240 745 240 745 165"/>
    <path d="M745 325 C745 270 650 255 565 255 C475 255 335 255 335 165"/>
    <path d="M395 420 V470 H745 V420"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="22" fill="black" text-anchor="middle">
    <text x="105" y="455">learner</text>
    <text x="335" y="120">earlier evidence</text>
    <text x="585" y="120">interpretation</text>
    <text x="830" y="120">bounded conclusion</text>
    <text x="395" y="365">change 1</text>
    <text x="395" y="395">control module</text>
    <text x="745" y="365">change 2</text>
    <text x="745" y="395">source-state setting</text>
    <text x="570" y="510">reopen affected dependency chain after each change</text>
  </g>
</svg>
