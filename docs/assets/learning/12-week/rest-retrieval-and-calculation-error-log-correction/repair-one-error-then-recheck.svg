<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Repair one error then recheck</title><desc id="desc">A seated stick figure corrects one item in an error log, follows arrows to affected work, then stops at a rest sign.</desc><rect width="960" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="120" cy="105" r="34"/><path d="M120 139v90m0-55-55 45m55-45 65 25m-65 30-45 65m45-65 55 65"/><rect x="260" y="55" width="300" height="245"/><path d="M295 105h220M295 150h220M295 195h220M295 240h220M310 185l12 12 22-28"/><path d="M580 180h120m-25-25 25 25-25 25"/><rect x="720" y="120" width="170" height="120" rx="12"/><path d="M755 170h100M805 145v50"/></g><g font-family="Arial, sans-serif" fill="black"><text x="285" y="38" font-size="24" font-weight="bold">Error log</text><text x="735" y="105" font-size="22" font-weight="bold">STOP / REST</text><text x="738" y="265" font-size="18">after the bounded repair</text><text x="165" y="385" font-size="22" font-weight="bold">Caption: Correct one cause, reopen affected work, record the prevention cue, then rest.</text></g></svg>