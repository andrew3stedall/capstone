<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Change one input and reopen every affected design gate</title>
  <desc id="desc">A black-and-white stick figure compares three design option cards, changes one input, and follows arrows to reopened checks for voltage drop, protection, installation and termination.</desc>
  <rect width="960" height="540" fill="white"/>
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="125" cy="145" r="28"/>
    <line x1="125" y1="173" x2="125" y2="270"/>
    <line x1="125" y1="205" x2="75" y2="240"/>
    <line x1="125" y1="205" x2="185" y2="225"/>
    <line x1="125" y1="270" x2="85" y2="340"/>
    <line x1="125" y1="270" x2="170" y2="340"/>
    <rect x="235" y="90" width="170" height="110" rx="12"/>
    <rect x="430" y="90" width="170" height="110" rx="12"/>
    <rect x="625" y="90" width="170" height="110" rx="12"/>
    <line x1="320" y1="200" x2="320" y2="265"/>
    <line x1="515" y1="200" x2="515" y2="265"/>
    <line x1="710" y1="200" x2="710" y2="265"/>
    <rect x="245" y="285" width="150" height="75" rx="10"/>
    <rect x="440" y="285" width="150" height="75" rx="10"/>
    <rect x="635" y="285" width="150" height="75" rx="10"/>
    <line x1="395" y1="322" x2="440" y2="322"/>
    <polyline points="425,310 440,322 425,334"/>
    <line x1="590" y1="322" x2="635" y2="322"/>
    <polyline points="620,310 635,322 620,334"/>
    <line x1="515" y1="360" x2="515" y2="420"/>
    <line x1="515" y1="420" x2="320" y2="420"/>
    <line x1="515" y1="420" x2="710" y2="420"/>
    <rect x="235" y="430" width="170" height="60" rx="10"/>
    <rect x="430" y="430" width="170" height="60" rx="10"/>
    <rect x="625" y="430" width="170" height="60" rx="10"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="black" text-anchor="middle">
    <text x="320" y="130" font-size="24" font-weight="700">Option A</text>
    <text x="320" y="165" font-size="20">baseline</text>
    <text x="515" y="130" font-size="24" font-weight="700">Option B</text>
    <text x="515" y="165" font-size="20">one change</text>
    <text x="710" y="130" font-size="24" font-weight="700">Option C</text>
    <text x="710" y="165" font-size="20">one change</text>
    <text x="320" y="330" font-size="20">recalculate</text>
    <text x="515" y="317" font-size="19">compare on</text>
    <text x="515" y="342" font-size="19">same basis</text>
    <text x="710" y="317" font-size="19">record trade-offs</text>
    <text x="710" y="342" font-size="19">and uncertainty</text>
    <text x="320" y="468" font-size="20">protection</text>
    <text x="515" y="468" font-size="20">installation</text>
    <text x="710" y="468" font-size="20">termination</text>
    <text x="480" y="525" font-size="24" font-weight="700">Change one input. Reopen every affected gate.</text>
  </g>
</svg>