<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
<title id="title">Trace a root weakness before selecting a transfer check</title>
<desc id="desc">A reviewer and learner stand beside a chain of three boxes. The first box is marked root weakness and branches to two symptom boxes. An arrow leads from the root weakness to a changed-context transfer check card.</desc>
<rect width="760" height="360" fill="white"/>
<g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
<circle cx="70" cy="78" r="23"/><path d="M70 101v82M70 132l-33 26M70 132l34 24M70 183l-26 57M70 183l30 57"/>
<circle cx="160" cy="78" r="23"/><path d="M160 101v82M160 132l-32 25M160 132l34 25M160 183l-28 57M160 183l30 57"/>
<rect x="250" y="55" width="150" height="70"/><rect x="470" y="35" width="145" height="60"/><rect x="470" y="135" width="145" height="60"/>
<path d="M400 90h45M445 90v-25M445 90v75M615 65h35M615 165h35"/>
<rect x="650" y="95" width="95" height="90"/>
<path d="M325 125v78M325 203h130M455 203v42M455 245h190"/>
<rect x="645" y="220" width="100" height="72"/>
</g>
<g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
<text x="325" y="84" font-size="17">ROOT</text><text x="325" y="107" font-size="17">WEAKNESS</text>
<text x="542" y="70" font-size="16">Symptom 1</text><text x="542" y="170" font-size="16">Symptom 2</text>
<text x="697" y="126" font-size="15">Do not</text><text x="697" y="148" font-size="15">repair each</text><text x="697" y="170" font-size="15">symptom</text>
<text x="695" y="248" font-size="15">Changed</text><text x="695" y="270" font-size="15">context check</text>
<text x="380" y="332" font-size="21">Repair the earliest dependency, then test transfer.</text>
</g>
</svg>
