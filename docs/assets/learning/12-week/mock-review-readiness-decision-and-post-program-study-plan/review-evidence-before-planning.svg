<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">Review evidence before planning</title>
  <desc id="desc">A stick-figure learner keeps an untouched mock in a locked box, reviews six labelled evidence cards, and writes a bounded four-week study plan.</desc>
  <rect width="860" height="420" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="70" cy="95" r="24"/><path d="M70 119v80M70 145l-35 28M70 145l45 18M70 199l-28 58M70 199l34 58"/>
    <rect x="145" y="45" width="150" height="95" rx="8"/><path d="M185 45v-18h70v18"/><circle cx="220" cy="88" r="7"/>
    <rect x="335" y="35" width="145" height="55"/><rect x="335" y="105" width="145" height="55"/><rect x="335" y="175" width="145" height="55"/>
    <rect x="500" y="35" width="145" height="55"/><rect x="500" y="105" width="145" height="55"/><rect x="500" y="175" width="145" height="55"/>
    <path d="M480 250h40M407 230v45h165v-45"/>
    <rect x="650" y="270" width="175" height="105" rx="8"/>
    <path d="M680 310h110M680 335h110"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="220" y="112" font-size="18" font-weight="700">UNTOUCHED MOCK</text>
    <text x="407" y="69" font-size="17">Result</text><text x="407" y="139" font-size="17">Process</text><text x="407" y="209" font-size="17">Safety</text>
    <text x="572" y="69" font-size="17">Explanation</text><text x="572" y="139" font-size="17">Confidence</text><text x="572" y="209" font-size="17">Time</text>
    <text x="737" y="298" font-size="18" font-weight="700">4-WEEK PLAN</text>
    <text x="430" y="405" font-size="23" font-weight="700">Preserve. Separate. Decide. Plan.</text>
  </g>
</svg>