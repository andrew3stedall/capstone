<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" role="img" aria-labelledby="title desc">
  <title id="title">Reopen dependent conclusions before deciding readiness</title>
  <desc id="desc">A black-and-white stick figure points to a broken claim chain at the first unsupported transition. Arrows lead back from three dependent conclusion cards to an evidence owner and a recheck trigger before the readiness decision.</desc>
  <rect width="900" height="440" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="75" cy="95" r="24"/>
    <path d="M75 119v88M75 148l-34 30M75 148l55 8M75 207l-28 62M75 207l32 62"/>
    <rect x="150" y="65" width="135" height="62" rx="8"/>
    <rect x="325" y="65" width="155" height="62" rx="8"/>
    <path d="M285 96h40"/>
    <path d="M302 82l17 14-17 14"/>
    <path d="M392 127v35"/>
    <path d="M377 146l15 16 15-16"/>
    <rect x="315" y="170" width="175" height="68" rx="8" stroke-dasharray="10 8"/>
    <path d="M490 204h50"/>
    <path d="M523 190l17 14-17 14"/>
    <rect x="550" y="35" width="150" height="58" rx="8"/>
    <rect x="550" y="112" width="150" height="58" rx="8"/>
    <rect x="550" y="189" width="150" height="58" rx="8"/>
    <path d="M625 247v42"/>
    <path d="M610 273l15 16 15-16"/>
    <rect x="535" y="298" width="180" height="58" rx="8"/>
    <path d="M715 327h55"/>
    <path d="M753 313l17 14-17 14"/>
    <rect x="780" y="285" width="105" height="85" rx="8"/>
    <path d="M392 238v55h143"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="217" y="91" font-size="17" font-weight="700">SUPPORTED</text>
    <text x="217" y="113" font-size="15">evidence</text>
    <text x="402" y="88" font-size="17" font-weight="700">CLAIM STEP</text>
    <text x="402" y="111" font-size="15">needs support</text>
    <text x="402" y="194" font-size="16" font-weight="700">FIRST UNSUPPORTED</text>
    <text x="402" y="217" font-size="16">TRANSITION — STOP</text>
    <text x="625" y="70" font-size="16">Design conclusion</text>
    <text x="625" y="147" font-size="16">Inspection conclusion</text>
    <text x="625" y="224" font-size="16">Verification conclusion</text>
    <text x="625" y="322" font-size="16" font-weight="700">OWNER + RECHECK</text>
    <text x="625" y="344" font-size="15">trigger recorded</text>
    <text x="832" y="316" font-size="15" font-weight="700">READINESS</text>
    <text x="832" y="339" font-size="15">decision</text>
    <text x="450" y="417" font-size="23" font-weight="700">Stop. Reopen. Assign. Recheck.</text>
  </g>
</svg>