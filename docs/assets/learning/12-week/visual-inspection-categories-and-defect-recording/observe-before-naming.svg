<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Observe before naming a defect</title>
  <desc id="desc">A stick-figure learner places visible facts on an observation card while keeping guesses on a separate card marked not yet.</desc>
  <rect width="960" height="440" fill="#fff"/>
  <g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="110" cy="210" r="28"/>
    <path d="M110 238V330 M110 270L190 240 M110 275L55 310 M110 330L75 390 M110 330L150 390"/>
    <rect x="260" y="85" width="245" height="220" rx="8"/>
    <path d="M300 140H465 M300 185H445 M300 230H470"/>
    <rect x="610" y="120" width="220" height="150" rx="8"/>
    <path d="M650 155L790 235 M790 155L650 235"/>
    <path d="M505 195L610 195"/>
    <path d="M580 175L610 195L580 215"/>
  </g>
  <g fill="#000" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="382" y="125" font-size="24" font-weight="700">OBSERVATION</text>
    <text x="720" y="105" font-size="24" font-weight="700">GUESS</text>
    <text x="720" y="300" font-size="22" font-weight="700">NOT YET</text>
    <text x="480" y="420" font-size="27" font-weight="700">Write what is visible before naming what it means.</text>
  </g>
</svg>