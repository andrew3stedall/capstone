<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Remove support one layer at a time</title><desc id="desc">A stick figure walks past four design boards that progressively contain fewer prompts, ending at a blank evidence record.</desc><rect width="960" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="100" cy="105" r="34"/><path d="M100 139v105m0-65-48 42m48-42 55 32m-55 33-42 88m42-88 50 88"/><rect x="205" y="70" width="150" height="235"/><rect x="390" y="70" width="150" height="235"/><rect x="575" y="70" width="150" height="235"/><rect x="760" y="70" width="150" height="235"/><path d="M230 115h100m-100 45h100m-100 45h100m-100 45h100M415 115h100m-100 45h100m-100 45h55M600 115h100m-100 45h55M785 115h100"/><path d="M350 340h530m-25-25 25 25-25 25"/></g><g font-family="Arial, sans-serif" fill="black"><text x="232" y="45" font-size="20">Complete</text><text x="410" y="45" font-size="20">Complete steps</text><text x="605" y="45" font-size="20">Restore reasoning</text><text x="790" y="45" font-size="20">Independent</text><text x="165" y="400" font-size="22" font-weight="bold">Caption: Remove one support layer, preserve the evidence chain, then transfer to a changed scenario.</text></g></svg>