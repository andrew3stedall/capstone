<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Check the authority boundary before proceeding</title>
  <desc id="desc">A black-and-white stick figure learner pauses at a gate labelled task boundary and checks four signs labelled activity, authority, supervision and stop conditions before continuing.</desc>
  <rect width="960" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="170" cy="190" r="30"/>
    <line x1="170" y1="220" x2="170" y2="350"/>
    <line x1="170" y1="255" x2="105" y2="300"/>
    <line x1="170" y1="255" x2="240" y2="285"/>
    <line x1="170" y1="350" x2="120" y2="440"/>
    <line x1="170" y1="350" x2="220" y2="440"/>
    <rect x="245" y="215" width="120" height="145" rx="8"/>
    <line x1="265" y1="250" x2="340" y2="250"/>
    <line x1="265" y1="282" x2="340" y2="282"/>
    <line x1="265" y1="314" x2="325" y2="314"/>
    <line x1="240" y1="285" x2="270" y2="280"/>
    <line x1="470" y1="105" x2="470" y2="445"/>
    <line x1="720" y1="105" x2="720" y2="445"/>
    <line x1="470" y1="115" x2="720" y2="115"/>
    <line x1="470" y1="430" x2="720" y2="430"/>
    <line x1="470" y1="255" x2="720" y2="255" stroke-dasharray="16 12"/>
    <path d="M595 255 L595 430"/>
    <path d="M570 275 L595 250 L620 275"/>
    <rect x="760" y="115" width="150" height="62" rx="8"/>
    <rect x="760" y="205" width="150" height="62" rx="8"/>
    <rect x="760" y="295" width="150" height="62" rx="8"/>
    <rect x="760" y="385" width="150" height="62" rx="8"/>
    <line x1="720" y1="145" x2="760" y2="145"/>
    <line x1="720" y1="235" x2="760" y2="235"/>
    <line x1="720" y1="325" x2="760" y2="325"/>
    <line x1="720" y1="415" x2="760" y2="415"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black">
    <text x="72" y="70" font-size="34" font-weight="700">Pause before crossing the task boundary.</text>
    <text x="520" y="95" font-size="24" font-weight="700">TASK BOUNDARY</text>
    <text x="785" y="153" font-size="22">Activity</text>
    <text x="780" y="243" font-size="22">Authority</text>
    <text x="770" y="333" font-size="22">Supervision</text>
    <text x="770" y="423" font-size="22">Stop conditions</text>
    <text x="90" y="485" font-size="24">Proceed only when every boundary is explicit and current.</text>
  </g>
</svg>