<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Section the route before applying factors</title><desc id="desc">A stick figure divides one cable route into four labelled sections before comparing installation influences.</desc><rect width="960" height="420" fill="white"/><g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><circle cx="110" cy="105" r="34"/><path d="M110 139v110m0-65-50 38m50-38 55 35m-55 30-40 90m40-90 50 90"/><path d="M235 210h610"/><path d="M380 175v70M535 175v70M690 175v70"/><rect x="255" y="95" width="105" height="55" rx="8"/><rect x="410" y="95" width="105" height="55" rx="8"/><rect x="565" y="95" width="105" height="55" rx="8"/><rect x="720" y="95" width="105" height="55" rx="8"/><path d="M290 280h500m-20-20 20 20-20 20"/></g><g font-family="Arial, sans-serif" fill="black"><text x="267" y="128" font-size="18">Open</text><text x="422" y="128" font-size="18">Grouped</text><text x="576" y="128" font-size="18">Insulated</text><text x="731" y="128" font-size="18">Terminal</text><text x="330" y="320" font-size="22">Compare sections using sourced evidence</text><text x="185" y="395" font-size="22" font-weight="bold">Caption: Split the route when conditions change; apply each verified influence once.</text></g></svg>