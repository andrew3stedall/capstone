<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc"><title id="title">Build the design evidence chain</title><desc id="desc">A stick-figure learner links cards labelled Inputs, Calculations, Decisions, Checks and Evidence, with a return arrow for changed inputs.</desc><rect width="760" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="80" cy="95" r="25"/><path d="M80 120v82M80 145l-35 35M80 145l42 20M80 202l-28 60M80 202l35 60"/><rect x="145" y="95" width="105" height="65"/><rect x="270" y="95" width="105" height="65"/><rect x="395" y="95" width="105" height="65"/><rect x="520" y="95" width="105" height="65"/><rect x="645" y="95" width="90" height="65"/><path d="M250 128h20M375 128h20M500 128h20M625 128h20M690 175c0 95-430 95-430 0M270 185l-12-12-12 12"/></g><g font-family="Arial, sans-serif" font-size="16" fill="black" text-anchor="middle"><text x="198" y="134">Inputs</text><text x="322" y="124">Calcul-</text><text x="322" y="145">ations</text><text x="447" y="134">Decisions</text><text x="572" y="134">Checks</text><text x="690" y="134">Evidence</text><text x="410" y="290" font-size="22">Changed inputs reopen earlier decisions.</text></g></svg>