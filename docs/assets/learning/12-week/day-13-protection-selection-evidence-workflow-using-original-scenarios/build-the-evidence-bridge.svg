<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Build the evidence bridge before making a protection conclusion</title>
  <desc id="desc">Black-and-white instructional cartoon showing a learner placing labelled evidence planks between hazard and a bounded conclusion, while an unsupported device guess falls into a gap.</desc>
  <rect width="960" height="520" fill="white"/>
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 390 H250 M710 390 H920"/>
    <path d="M250 390 Q480 470 710 390" stroke-dasharray="12 12"/>
    <circle cx="175" cy="190" r="28"/>
    <path d="M175 218 V305 M175 245 L125 280 M175 248 L230 270 M175 305 L140 365 M175 305 L215 365"/>
    <path d="M125 280 L105 315"/>
    <rect x="44" y="330" width="180" height="55" rx="8"/>
    <rect x="736" y="330" width="184" height="55" rx="8"/>
    <rect x="270" y="330" width="120" height="34" rx="5" transform="rotate(-7 330 347)"/>
    <rect x="400" y="350" width="120" height="34" rx="5"/>
    <rect x="530" y="330" width="150" height="34" rx="5" transform="rotate(7 605 347)"/>
    <path d="M266 322 L238 276"/>
    <path d="M240 276 L260 280 M240 276 L244 296"/>
    <rect x="420" y="110" width="150" height="62" rx="8"/>
    <path d="M495 172 L495 230"/>
    <path d="M470 215 L495 240 L520 215"/>
    <path d="M500 285 q60 -35 120 0"/>
    <path d="M600 280 l30 35 l20 -60"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="134" y="352" font-size="21">HAZARD +</text>
    <text x="134" y="376" font-size="21">PROTECTED INTEREST</text>
    <text x="828" y="352" font-size="21">BOUNDED</text>
    <text x="828" y="376" font-size="21">CONCLUSION</text>
    <text x="330" y="353" font-size="18">FACTS</text>
    <text x="460" y="373" font-size="18">FUNCTIONS</text>
    <text x="605" y="353" font-size="18">AUTHORISED SOURCES</text>
    <text x="495" y="138" font-size="19">DEVICE GUESS</text>
    <text x="495" y="160" font-size="16">without evidence</text>
    <text x="480" y="490" font-size="22">Build every evidence link before crossing to a conclusion.</text>
  </g>
</svg>
