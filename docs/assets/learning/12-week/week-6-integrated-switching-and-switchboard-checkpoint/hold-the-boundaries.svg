<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">Hold source, function and evidence boundaries together</title><desc id="desc">A stick-figure learner connects three labelled boxes for sources, switch functions and evidence before reaching a bounded decision.</desc><rect width="960" height="420" fill="#fff"/><g stroke="#000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="105" cy="205" r="25"/><path d="M105 230V310M105 250L180 215M105 260L55 285M105 310L70 375M105 310L145 375"/><rect x="220" y="70" width="170" height="75" rx="8"/><rect x="220" y="175" width="170" height="75" rx="8"/><rect x="220" y="280" width="170" height="75" rx="8"/><path d="M390 108L550 205M390 212H550M390 318L550 215"/><rect x="550" y="160" width="170" height="100" rx="8"/><path d="M720 210H825"/><rect x="825" y="170" width="115" height="80" rx="8"/></g><g fill="#000" font-family="Arial,Helvetica,sans-serif" text-anchor="middle"><text x="305" y="115" font-size="21" font-weight="700">SOURCES</text><text x="305" y="220" font-size="21" font-weight="700">FUNCTIONS</text><text x="305" y="325" font-size="21" font-weight="700">EVIDENCE</text><text x="635" y="205" font-size="20" font-weight="700">INTEGRATE</text><text x="882" y="207" font-size="18" font-weight="700">BOUND</text><text x="480" y="402" font-size="27" font-weight="700">One missing boundary can undo the whole answer.</text></g></svg>