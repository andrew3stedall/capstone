<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc"><title id="title">Protect the review reserve</title><desc id="desc">A stick-figure learner follows a timeline from reading to response to checking, with the final review block protected by a bold outline.</desc><rect width="760" height="360" fill="white"/><g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="75" cy="95" r="25"/><path d="M75 120v80M75 145l-38 30M75 145l42 20M75 200l-28 58M75 200l34 58"/><rect x="150" y="95" width="130" height="80"/><rect x="300" y="95" width="190" height="80"/><rect x="510" y="95" width="170" height="80" stroke-width="8"/><path d="M280 135h20M490 135h20"/><path d="M595 70v-25M565 45h60"/></g><g font-family="Arial, sans-serif" font-size="17" fill="black" text-anchor="middle"><text x="215" y="130">Read and</text><text x="215" y="153">decompose</text><text x="395" y="142">Integrated response</text><text x="595" y="130">Protected final</text><text x="595" y="153">review reserve</text><text x="380" y="315" font-size="22">Protect review time before the attempt begins.</text></g></svg>