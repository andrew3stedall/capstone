<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
<title id="title">Use a time gate for bounded completion</title>
<desc id="desc">A stick figure stands beside a clock and three deliverable cards. At the time gate, the learner marks one unresolved limitation, links it to an evidence owner, and continues to the protected review card.</desc>
<rect width="760" height="360" fill="white"/>
<g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
<circle cx="72" cy="82" r="24"/><path d="M72 106v82M72 136l-34 28M72 136l38 22M72 188l-28 58M72 188l32 58"/>
<circle cx="185" cy="92" r="44"/><path d="M185 92V63M185 92l25 17"/>
<rect x="260" y="42" width="130" height="62"/><rect x="260" y="132" width="130" height="62"/><rect x="260" y="222" width="130" height="62"/>
<path d="M230 92h30M390 73h72M390 163h72M390 253h72"/>
<rect x="462" y="118" width="138" height="90"/><path d="M531 208v42M531 250h74"/>
<rect x="605" y="218" width="125" height="66"/>
<path d="M600 163h78M678 163v55"/>
</g>
<g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
<text x="185" y="154" font-size="17">TIME GATE</text>
<text x="325" y="79" font-size="16">Deliverable 1</text>
<text x="325" y="169" font-size="16">Deliverable 2</text>
<text x="325" y="259" font-size="16">Deliverable 3</text>
<text x="531" y="148" font-size="16">Mark limitation</text>
<text x="531" y="174" font-size="16">owner + trigger</text>
<text x="667" y="247" font-size="16">Protected</text>
<text x="667" y="270" font-size="16">review</text>
<text x="380" y="330" font-size="21">Bound the gap, preserve the dependency, then continue.</text>
</g>
</svg>