<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
<title id="title">Stop at the first unsupported transition</title>
<desc id="desc">A stick-figure learner follows three claim cards. The first two are connected, the third is blocked by a stop symbol. A line leads from the blocked card to an evidence-owner card and a recheck-trigger card.</desc>
<rect width="760" height="360" fill="white"/>
<g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="70" cy="70" r="22"/>
  <path d="M70 92v86M70 124l-34 25M70 124l34 25M70 178l-26 56M70 178l28 56"/>
  <rect x="150" y="62" width="130" height="78"/>
  <rect x="330" y="62" width="130" height="78"/>
  <rect x="510" y="62" width="160" height="78"/>
  <path d="M280 101h50M460 101h50"/>
  <circle cx="485" cy="101" r="25"/>
  <path d="M469 85l32 32M501 85l-32 32"/>
  <path d="M590 140v46"/>
  <rect x="500" y="186" width="180" height="66"/>
  <path d="M590 252v34"/>
  <rect x="500" y="286" width="180" height="52"/>
</g>
<g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
  <text x="215" y="92" font-size="16">Literal fact</text>
  <text x="215" y="116" font-size="16">supported</text>
  <text x="395" y="92" font-size="16">Interpretation</text>
  <text x="395" y="116" font-size="16">supported</text>
  <text x="590" y="90" font-size="16">Dependent claim</text>
  <text x="590" y="116" font-size="16">blocked</text>
  <text x="590" y="214" font-size="16">Evidence owner</text>
  <text x="590" y="234" font-size="14">who or what closes the gap</text>
  <text x="590" y="317" font-size="16">Recheck trigger</text>
  <text x="275" y="326" font-size="20">Preserve supported steps; never guess across the gap.</text>
</g>
</svg>
