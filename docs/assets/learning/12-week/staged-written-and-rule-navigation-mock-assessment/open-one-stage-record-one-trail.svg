<svg xmlns="http://www.w3.org/2000/svg" width="820" height="390" viewBox="0 0 820 390" role="img" aria-labelledby="title desc">
  <title id="title">Open one stage and record one trail</title>
  <desc id="desc">A stick-figure learner opens one labelled envelope at a time and writes a source trail before moving to the next stage, while a review block remains locked.</desc>
  <rect width="820" height="390" fill="white"/>
  <g fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="80" cy="100" r="24"/><path d="M80 124v80M80 148l-38 28M80 148l48 20M80 204l-28 58M80 204l34 58"/>
    <rect x="180" y="55" width="140" height="85"/><path d="M180 55l70 50 70-50"/>
    <rect x="350" y="55" width="140" height="85"/><path d="M350 55l70 50 70-50"/>
    <rect x="520" y="55" width="140" height="85"/><path d="M520 55l70 50 70-50"/>
    <path d="M250 140v65M420 140v65M590 140v65"/>
    <rect x="185" y="210" width="465" height="95"/>
    <path d="M220 242h390M220 273h300"/>
    <rect x="675" y="205" width="105" height="105" stroke-width="7"/>
  </g>
  <g font-family="Arial, sans-serif" fill="black" text-anchor="middle">
    <text x="250" y="45" font-size="18">Stage A</text><text x="420" y="45" font-size="18">Stage B</text><text x="590" y="45" font-size="18">Stage C</text>
    <text x="418" y="238" font-size="18" font-weight="700">SEARCH TRAIL</text>
    <text x="727" y="250" font-size="17" font-weight="700">REVIEW</text><text x="727" y="276" font-size="17" font-weight="700">RESERVE</text>
    <text x="410" y="360" font-size="23" font-weight="700">Open one stage. Record one trail. Preserve the evidence.</text>
  </g>
</svg>