name: Reconstruct clean learning branch

on:
  push:
    branches:
      - automation/6-week-learning-plan
      - automation/12-week-learning-plan

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild plan on current main
        shell: bash
        run: |
          set -euo pipefail

          case "${GITHUB_REF_NAME}" in
            automation/6-week-learning-plan)
              plan="6-week"
              note_pattern="Six-Week Day *.md"
              target="integration/6-week-learning-plan"
              ;;
            automation/12-week-learning-plan)
              plan="12-week"
              note_pattern="12-Week Day *.md"
              target="integration/12-week-learning-plan"
              ;;
            *)
              echo "Unsupported source branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          files=(
            "docs/learning-plans/${plan}"
            "docs/assets/learning/${plan}"
          )

          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find docs/knowledge-base -maxdepth 1 -type f -name "${note_pattern}" -print0)

          tar -cf /tmp/learning-plan.tar "${files[@]}"

          git fetch origin main
          git checkout --detach origin/main
          git switch -C "${target}"
          tar -xf /tmp/learning-plan.tar

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "docs/learning-plans/${plan}" "docs/assets/learning/${plan}" docs/knowledge-base
          git commit -m "docs: integrate ${plan} learning plan"
          git push --force-with-lease origin "HEAD:refs/heads/${target}"
