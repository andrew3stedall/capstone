name: Docs render check

on:
  push:
    branches:
      - automation/4-week-learning-plan
    paths:
      - 'docs/**'
      - 'scripts/normalize-mermaid.mjs'
      - 'scripts/validate-docs.mjs'
      - 'scripts/validate-mermaid.mjs'
      - '.github/workflows/docs-render-check.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/normalize-mermaid.mjs'
      - 'scripts/validate-docs.mjs'
      - 'scripts/validate-mermaid.mjs'
      - '.github/workflows/docs-render-check.yml'

permissions:
  contents: read

jobs:
  render-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Normalize Mermaid for GitHub
        run: node scripts/normalize-mermaid.mjs --write

      - name: Create normalization patch
        shell: bash
        run: git diff --binary > normalized-mermaid.patch

      - name: Upload normalization patch
        uses: actions/upload-artifact@v4
        with:
          name: normalized-mermaid-patch
          path: normalized-mermaid.patch
          if-no-files-found: error

      - name: Check normalized Mermaid source
        run: node scripts/normalize-mermaid.mjs

      - name: Audit Markdown, links and SVG accessibility
        run: node scripts/validate-docs.mjs

      - name: Render every Mermaid block
        run: node scripts/validate-mermaid.mjs

      - name: Check whitespace errors
        run: git diff --check
