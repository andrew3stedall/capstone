name: Docs render check

on:
  push:
    branches:
      - automation/4-week-learning-plan
    paths:
      - 'docs/**'
      - 'scripts/normalize-mermaid.mjs'
      - 'scripts/validate-docs.mjs'
      - 'scripts/validate-mermaid.mjs'
      - '.github/workflows/docs-render-check.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/normalize-mermaid.mjs'
      - 'scripts/validate-docs.mjs'
      - 'scripts/validate-mermaid.mjs'
      - '.github/workflows/docs-render-check.yml'

permissions:
  contents: read

jobs:
  render-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Normalize Mermaid for GitHub
        run: node scripts/normalize-mermaid.mjs --write

      - name: Create normalization patch
        shell: bash
        run: git diff --binary > normalized-mermaid.patch

      - name: Check normalized Mermaid source
        run: node scripts/normalize-mermaid.mjs

      - name: Audit Markdown, links and SVG accessibility
        shell: bash
        run: |
          set +e
          node scripts/validate-docs.mjs > docs-audit.log 2>&1
          echo "$?" > docs-audit.status
          exit 0

      - name: Render every Mermaid block
        shell: bash
        run: |
          set +e
          node scripts/validate-mermaid.mjs > mermaid-audit.log 2>&1
          echo "$?" > mermaid-audit.status
          exit 0

      - name: Check whitespace errors
        shell: bash
        run: |
          set +e
          git diff --check > whitespace-audit.log 2>&1
          echo "$?" > whitespace-audit.status
          exit 0

      - name: Upload render-audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: docs-render-audit
          path: |
            normalized-mermaid.patch
            docs-audit.log
            docs-audit.status
            mermaid-audit.log
            mermaid-audit.status
            whitespace-audit.log
            whitespace-audit.status
          if-no-files-found: error

      - name: Enforce audit result
        shell: bash
        run: |
          cat docs-audit.log
          cat mermaid-audit.log
          cat whitespace-audit.log

          if [ "$(cat docs-audit.status)" != "0" ] || \
             [ "$(cat mermaid-audit.status)" != "0" ] || \
             [ "$(cat whitespace-audit.status)" != "0" ]; then
            exit 1
          fi
