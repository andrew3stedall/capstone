name: Sync four-week learning navigation

on:
  push:
    branches:
      - automation/4-week-learning-plan
    paths:
      - 'docs/learning-plans/4-week/modules/*.md'
      - 'docs/knowledge-base/Day *.md'
      - 'scripts/sync-learning-plan-navigation.mjs'
      - '.github/workflows/sync-learning-plan-navigation.yml'

permissions:
  contents: write

concurrency:
  group: learning-plan-navigation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-navigation:
    if: github.actor != 'github-actions[bot]' || !contains(github.event.head_commit.message, 'docs: sync four-week sequence navigation')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the learning-plan branch
        uses: actions/checkout@v4
        with:
          ref: automation/4-week-learning-plan
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Synchronise previous and next links
        run: node scripts/sync-learning-plan-navigation.mjs

      - name: Commit navigation updates
        shell: bash
        run: |
          if git diff --quiet -- docs/learning-plans/4-week/modules docs/knowledge-base; then
            echo 'Sequence navigation is already current.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/learning-plans/4-week/modules docs/knowledge-base
          git commit -m 'docs: sync four-week sequence navigation'
          git push origin HEAD:automation/4-week-learning-plan
